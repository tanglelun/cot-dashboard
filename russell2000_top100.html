// ===== APP ENGINE =====
function createApp(mountId, rawData, label, groupKey) {
  const data = rawData;
  let curTime = 'd', curSort = {key:'gain',dir:'desc'}, curSector = 'all', curPage = 1;
  const PP = 9999;
  const container = document.getElementById(mountId);
  container.innerHTML = '<div class="controls">' +
    '<div class="cg"><label>周期</label>' +
    '<button class="cb active" data-t="d">近1日</button><button class="cb" data-t="w">近1周</button>' +
    '<button class="cb" data-t="m">近1月</button>' +
    '<button class="cb" data-t="m2">近2月</button>' +
    '<button class="cb" data-t="q">近3月</button>' +
    '<button class="cb" data-t="h">近半年</button>' +
    '<button class="cb" data-t="y">YTD</button></div>' +
    '<div class="cg"><label>排序</label>' +
    '<button class="cb active" data-s="gain">涨幅</button>' +
    '<button class="cb" data-s="rank">排名</button>' +
    '<button class="cb" data-s="price">股价</button>' +
    '<button class="cb" data-s="mcapNum">市值</button></div>' +
    '<div class="cg"><label>板块</label>' +
    '<button class="cb active" data-f="all">全部</button>' +
    '<button class="cb" data-f="科技">科技</button>' +
    '<button class="cb" data-f="医疗">医疗</button>' +
    '<button class="cb" data-f="工业">工业</button>' +
    '<button class="cb" data-f="能源">能源</button>' +
    '<button class="cb" data-f="金融">金融</button>' +
    '<button class="cb" data-f="基础材料">基础材料</button>' +
    '<button class="cb" data-f="通信">通信</button>' +
    '<button class="cb" data-f="消费周期">消费周期</button>' +
    '<button class="cb" data-f="消费防御">消费防御</button>' +
    '<button class="cb" data-f="公用事业">公用事业</button>' +
    '<button class="cb" data-f="房地产">房地产</button></div>' +
    '<input class="search-box" id="'+mountId+'_srch" placeholder="搜索代码或名称..."></div>' +
    '<div class="stats"><span>共 <strong id="'+mountId+'_cnt">0</strong> 只股票 | 更新于 2026-06-29</span></div>' +
    '<div style="overflow-x:auto"><table><thead><tr>' +
    '<th class="rk" data-sort="rank">#<span class="ar"></span></th>' +
    '<th>代码</th><th>公司名称</th>' +
    '<th class="gc" data-sort="gain">涨幅<span class="ar"></span></th>' +
    '<th class="pr" data-sort="price">股价<span class="ar"></span></th>' +
    '<th class="mc" data-sort="mcapNum">市值<span class="ar"></span></th>' +
    '<th>板块</th></tr></thead>' +
    '<tbody id="'+mountId+'_body"></tbody></table></div>' +
    '<div class="pg" id="'+mountId+'_pg"></div>';
  container.addEventListener('click',function(e){
    var btn=e.target.closest('.cb[data-t]');if(btn){window[mountId+'_setTime'](btn.getAttribute('data-t'));return;}
    btn=e.target.closest('.cb[data-s]');if(btn){window[mountId+'_setSort'](btn.getAttribute('data-s'));return;}
    btn=e.target.closest('.cb[data-f]');if(btn){window[mountId+'_setSector'](btn.getAttribute('data-f'));return;}
    btn=e.target.closest('th[data-sort]');if(btn){window[mountId+'_setSort'](btn.getAttribute('data-sort'));return;}
    btn=e.target.closest('.pb[data-page]');if(btn){window[mountId+'_goPage'](Number(btn.getAttribute('data-page')));return;}
  });
  document.getElementById(mountId+'_srch').addEventListener('input',function(){window[mountId+'_filter']();});
  function getGain(d){var f=curTime==='y'?'y':curTime;return d[f]||0}
  function chartUrl(d){
    return 'stock_chart.html?symbol='+encodeURIComponent(d.t)+
      '&name='+encodeURIComponent(d.n)+
      '&universe='+encodeURIComponent(groupKey)+
      '&metric='+encodeURIComponent(curTime)+
      '&sort='+encodeURIComponent(curSort.key)+
      '&dir='+encodeURIComponent(curSort.dir);
  }
  function render(){
    var arr=[].concat(data);
    var q=document.getElementById(mountId+'_srch').value.toLowerCase().trim();
    if(q)arr=arr.filter(function(d){return d.t.toLowerCase().includes(q)||d.n.toLowerCase().includes(q)});
    if(curSector!=='all')arr=arr.filter(function(d){return d.s===curSector});
    var k=curSort.key,dir=curSort.dir;
    arr.sort(function(a,b){
      if(k==='gain')return dir==='desc'?getGain(b)-getGain(a):getGain(a)-getGain(b);
      if(k==='price')return dir==='desc'?(Number(b.p)||0)-(Number(a.p)||0):(Number(a.p)||0)-(Number(b.p)||0);
      if(k==='mcapNum')return dir==='desc'?b.mn-a.mn:a.mn-b.mn;
      return dir==='asc'?a.r-b.r:b.r-a.r;
    });
    document.getElementById(mountId+'_cnt').textContent=arr.length;
    var tp=Math.ceil(arr.length/PP);
    if(curPage>tp)curPage=tp||1;
    var start=(curPage-1)*PP,page=arr.slice(start,start+PP);
    document.getElementById(mountId+'_body').innerHTML=page.map(function(d,i){
      var pos=start+i+1,g=Number(getGain(d))||0,rc=pos<=3?'rk t3':'rk',ss=g>=0?'+':'';
      var gc=g>=300?'u':(g>=150?'h':(g>=0?'p':'n'));
      var href=chartUrl(d);
      return '<tr><td class="'+rc+'">'+pos+'</td><td class="tk"><a href="'+href+'">'+d.t+'</a></td><td class="cn" title="'+d.n+'"><a href="'+href+'">'+d.n+'</a></td><td class="gc"><span class="g '+gc+'">'+ss+g.toFixed(2)+'%</span></td><td class="pr"><span class="m">'+(d.p?Number(d.p).toFixed(2):'---')+'</span></td><td class="mc"><span class="m">'+(d.mn===0?'---':d.c)+'</span></td><td><span class="st">'+d.s+'</span></td></tr>';
    }).join('');
    var pg=document.getElementById(mountId+'_pg');
    if(tp<=1){pg.innerHTML='';return;}
    var hp='';
    if(curPage>1)hp+='<button class="pb" data-page="'+(curPage-1)+'">&#8249;</button>';
    for(var i=Math.max(1,curPage-2);i<=Math.min(tp,curPage+2);i++)
      hp+='<button class="pb '+(i===curPage?'act':'')+'" data-page="'+i+'">'+i+'</button>';
    if(curPage<tp)hp+='<button class="pb" data-page="'+(curPage+1)+'">&#8250;</button>';
    pg.innerHTML=hp;
  }
  window[mountId+'_goPage']=function(n){curPage=n;render();};
  window[mountId+'_setTime']=function(t){
    curTime=t;curPage=1;
    [].forEach.call(document.querySelectorAll('#'+mountId+' .cb[data-t]'),function(b){b.classList.remove('active')});
    var btn=document.querySelector('#'+mountId+' .cb[data-t="'+t+'"]');
    if(btn)btn.classList.add('active');
    render();
  };
  window[mountId+'_setSort']=function(key){
    var dir=(curSort.key===key&&curSort.dir==='desc')?'asc':'desc';
    curSort={key:key,dir:dir};curPage=1;
    [].forEach.call(document.querySelectorAll('#'+mountId+' .cb[data-s]'),function(b){b.classList.remove('active')});
    var btn=document.querySelector('#'+mountId+' .cb[data-s="'+key+'"]');
    if(btn)btn.classList.add('active');
    render();
  };
  window[mountId+'_setSector']=function(s){
    curSector=s;curPage=1;
    [].forEach.call(document.querySelectorAll('#'+mountId+' .cb[data-f]'),function(b){b.classList.remove('active')});
    var target=document.querySelector('#'+mountId+' .cb[data-f="'+s+'"]');
    if(target)target.classList.add('active');
    render();
  };
  window[mountId+'_filter']=function(){curPage=1;render();};
  render();
}
function switchTab(id){
  [].forEach.call(document.querySelectorAll('.tab'),function(t){t.classList.remove('active')});
  document.querySelector('.tab[data-tab="'+id+'"]').classList.add('active');
  [].forEach.call(document.querySelectorAll('.tab-pane'),function(p){p.classList.remove('active')});
  document.getElementById('pane-'+id).classList.add('active');
}
function setupNavSearch(){
  var form=document.querySelector('.nav-search');
  if(!form)return;
  var input=form.querySelector('input[name="q"]');
  function runSearch(){
    var query=(input.value||'').trim();
    if(!query)return;
    var normalized=query.toLowerCase();
    var rows=[].concat(r2kRaw,spRaw,ndqRaw);
    var seen={};
    rows=rows.filter(function(row){
      if(seen[row.t])return false;
      seen[row.t]=true;
      return true;
    });
    var match=rows.find(function(row){return String(row.t||'').toLowerCase()===normalized;})||
      rows.find(function(row){return String(row.n||'').toLowerCase().includes(normalized);});
    var target=match||{t:query.toUpperCase(),n:query};
    var params=new URLSearchParams();
    params.set('symbol',target.t);
    params.set('name',target.n||target.t);
    window.location.href='stock_chart.html?'+params.toString();
  }
  form.addEventListener('submit',function(event){
    event.preventDefault();
    runSearch();
  });
  input.addEventListener('keydown',function(event){
    if(event.key!=='Enter')return;
    event.preventDefault();
    runSearch();
  });
}
function fmtCommodityNumber(value, digits){
  if(value===null||value===undefined||Number.isNaN(Number(value)))return '---';
  return Number(value).toLocaleString(undefined,{minimumFractionDigits:digits,maximumFractionDigits:digits});
}
function fmtCommodityPct(value){
  if(value===null||value===undefined||Number.isNaN(Number(value)))return '<span class="g">---</span>';
  var number=Number(value), sign=number>0?'+':'', cls=number>=0?'p':'n';
  return '<span class="g '+cls+'">'+sign+number.toFixed(2)+'%</span>';
}
function renderCommodities(payload){
  var rows=(payload&&payload.commodities)||[];
  var meta=document.getElementById('commoditiesMeta');
  var mount=document.getElementById('commoditiesTable');
  if(!rows.length){
    meta.textContent='Commodities';
    mount.innerHTML='<div class="commodity-empty">No commodity data available.</div>';
    return;
  }
  meta.innerHTML='<span>共 <strong>'+rows.length+'</strong> 个商品</span><span>更新于 '+(payload.updated||'---')+'</span><span>Source: Yahoo Finance futures</span>';
  var groups=['Energy','Metals','Agriculture','Livestock'];
  var grouped=groups.map(function(group){
    return {name:group,rows:rows.filter(function(row){return row.category===group;})};
  }).filter(function(group){return group.rows.length;});
  var html='<div class="commodity-table-wrap"><table class="commodity-table"><thead><tr>'+
    '<th>Commodity</th><th class="pr">Price</th><th class="gc">Day</th><th class="gc">Week</th>'+
    '<th class="gc">Month</th><th class="gc">YTD</th><th class="gc">1Y</th><th class="pr">Previous</th><th>Unit</th><th>Date</th>'+
    '</tr></thead><tbody>';
  grouped.forEach(function(group){
    html+='<tr class="group-row"><td colspan="10">'+group.name+'</td></tr>';
    group.rows.forEach(function(row){
      html+='<tr>'+
        '<td><span class="commodity-name">'+row.name+'</span><span class="commodity-symbol">'+row.symbol+'</span></td>'+
        '<td class="commodity-price">'+fmtCommodityNumber(row.price,4)+'</td>'+
        '<td class="gc">'+fmtCommodityPct(row.day)+'</td>'+
        '<td class="gc">'+fmtCommodityPct(row.week)+'</td>'+
        '<td class="gc">'+fmtCommodityPct(row.month)+'</td>'+
        '<td class="gc">'+fmtCommodityPct(row.ytd)+'</td>'+
        '<td class="gc">'+fmtCommodityPct(row.year)+'</td>'+
        '<td class="commodity-price">'+fmtCommodityNumber(row.previous,4)+'</td>'+
        '<td><span class="commodity-unit">'+(row.unit||'')+'</span></td>'+
        '<td class="commodity-date">'+(row.date||'---')+'</td>'+
        '</tr>';
    });
  });
  html+='</tbody></table></div>';
  mount.innerHTML=html;
}
function setupMarketType(){
  var select=document.getElementById('marketTypeSelect');
  var stock=document.getElementById('stockMarketView');
  var commodities=document.getElementById('commoditiesMarketView');
  var loaded=false;
  function show(value){
    var isCommodities=value==='commodities';
    stock.classList.toggle('hidden',isCommodities);
    commodities.classList.toggle('hidden',!isCommodities);
    if(isCommodities&&!loaded){
      loaded=true;
      fetch('commodities_data.json',{cache:'no-store'})
        .then(function(response){if(!response.ok)throw new Error('No commodities data');return response.json();})
        .then(renderCommodities)
        .catch(function(){
          document.getElementById('commoditiesMeta').textContent='Commodities';
          document.getElementById('commoditiesTable').innerHTML='<div class="commodity-empty">Commodity data has not been generated yet. Run python update_commodities.py.</div>';
        });
    }
  }
  select.addEventListener('change',function(){show(select.value);});
  show(select.value);
}
setupNavSearch();
setupMarketType();
createApp('app-r2000', r2kRaw, 'Russell 2000', 'r2kRaw');
createApp('app-sp500', spRaw, 'S&P 500', 'spRaw');
createApp('app-nasdaq', ndqRaw, 'Nasdaq 100', 'ndqRaw');
