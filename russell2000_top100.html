<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股三大指数 - 涨幅排行</title>
<style>
:root{
  --tv-bg:#000;
  --tv-panel:#050709;
  --tv-panel-2:#090d12;
  --tv-border:#202932;
  --tv-border-soft:#111820;
  --tv-text:#d1d4dc;
  --tv-muted:#787b86;
  --tv-faint:#5d606b;
  --tv-blue:#2962ff;
  --tv-green:#00d109;
  --tv-red:#ff4d00;
  --tv-amber:#f6a821;
  --tv-hover:#101820;
  --tv-accent:#00d109;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{max-width:100%;overflow-x:hidden}
body{font-family:Inter,Arial,sans-serif;background:var(--tv-bg);color:var(--tv-text);padding:0}
.site-nav{min-height:64px;display:flex;align-items:center;gap:28px;padding:0 24px;background:#000;border-bottom:1px solid #1b1f2a;position:relative;z-index:30}
.site-brand{display:inline-flex;align-items:center;gap:10px;color:#fff;text-decoration:none;font-size:25px;font-weight:800;letter-spacing:0;white-space:nowrap}
.brand-mark{position:relative;width:22px;height:26px;display:inline-block}
.brand-mark::before{content:"";position:absolute;left:7px;top:1px;width:10px;height:24px;background:#fff;border-radius:10px 10px 10px 1px;transform:skew(-18deg) rotate(22deg);transform-origin:center}
.brand-mark::after{content:"";position:absolute;left:2px;bottom:2px;width:13px;height:3px;background:#fff;border-radius:999px;transform:rotate(-34deg)}
.nav-check{position:absolute;opacity:0;pointer-events:none}
.nav-toggle{display:none;width:38px;height:38px;border:1px solid #2a2e39;border-radius:999px;align-items:center;justify-content:center;flex-direction:column;gap:4px;cursor:pointer;margin-left:auto}
.nav-toggle span{width:16px;height:2px;background:#fff;border-radius:999px}
.nav-links{display:flex;align-items:center;gap:28px;flex:0 1 auto}
.nav-link{position:relative;color:#f3f4f6;text-decoration:none;font-size:15px;font-weight:650;white-space:nowrap}
.nav-link:hover{color:#b8ff00}
.nav-link.active{color:#b8ff00}
.nav-link.active::after{display:none}
.nav-market{position:relative;display:flex;align-items:center}
.market-menu{position:absolute;left:50%;top:calc(100% + 14px);min-width:190px;padding:8px;border:1px solid #26313d;border-radius:8px;background:rgba(9,13,18,.96);box-shadow:0 18px 48px rgba(0,0,0,.48);transform:translateX(-50%) translateY(6px);opacity:0;visibility:hidden;pointer-events:none;transition:opacity .14s ease,transform .14s ease,visibility .14s ease;z-index:50}
.market-menu::before{content:"";position:absolute;left:0;right:0;top:-15px;height:15px}
.nav-market:hover .market-menu,.nav-market:focus-within .market-menu{opacity:1;visibility:visible;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.market-menu-link{display:flex;align-items:center;justify-content:space-between;gap:16px;height:34px;padding:0 10px;border-radius:5px;color:var(--tv-text);font-size:13px;font-weight:800;text-decoration:none;white-space:nowrap}
.market-menu-link:hover,.market-menu-link.active{background:rgba(0,209,9,.16);color:#fff}
.market-menu-link.active::after{content:"";width:7px;height:12px;border-right:2px solid var(--tv-accent);border-bottom:2px solid var(--tv-accent);transform:rotate(45deg) translateY(-1px)}
.nav-search{position:relative;flex:0 1 360px;min-width:220px;margin-left:auto}
.nav-search input{width:100%;height:42px;border:1px solid #2a2e39;border-radius:999px;background:#090c12;color:#fff;padding:0 16px 0 42px;font-size:15px;font-weight:650;outline:none}
.nav-search input::placeholder{color:#787b86}
.nav-search input:focus{border-color:#b8ff00;box-shadow:0 0 0 1px rgba(184,255,0,.24)}
.nav-search-mark{position:absolute;left:16px;top:50%;width:13px;height:13px;border:2px solid #b8ff00;border-radius:50%;transform:translateY(-50%);pointer-events:none}
.nav-search-mark::after{content:"";position:absolute;width:7px;height:2px;background:#b8ff00;border-radius:999px;right:-6px;bottom:-4px;transform:rotate(45deg)}
.nav-search-results{position:absolute;left:0;right:0;top:calc(100% + 8px);max-height:320px;overflow:auto;padding:6px;border:1px solid #26313d;border-radius:8px;background:rgba(9,13,18,.98);box-shadow:0 18px 48px rgba(0,0,0,.48);display:none;z-index:80;scrollbar-color:#2a3440 #080c12;scrollbar-width:thin}
.nav-search-results.open{display:block}
.nav-result{width:100%;border:0;background:transparent;color:var(--tv-text);display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:8px;align-items:center;padding:8px;border-radius:5px;cursor:pointer;text-align:left}
.nav-result:hover,.nav-result.active{background:rgba(0,209,9,.14);color:#fff}
.nav-result-symbol{font-weight:850;font-size:13px;color:#fff}
.nav-result-name{font-size:12px;color:var(--tv-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-result-change{font-size:12px;font-weight:850;font-family:Inter,Arial,sans-serif}
.nav-result-change.up{color:var(--tv-green)}.nav-result-change.down{color:var(--tv-red)}
.container{width:100%;max-width:100%;margin:0;padding:10px clamp(10px,1vw,24px);overflow:hidden}
.market-header{display:none}
.market-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:var(--tv-muted)}
.market-select-wrap{position:relative;display:inline-flex;align-items:center}
.market-select{appearance:none;-webkit-appearance:none;height:34px;min-width:172px;padding:0 34px 0 11px;border:1px solid var(--tv-border);border-radius:5px;background:var(--tv-panel-2);color:var(--tv-text);font-size:13px;font-weight:800;outline:none;cursor:pointer}
.market-select:hover{background:var(--tv-hover);color:#fff}
.market-select:focus{border-color:var(--tv-accent);box-shadow:0 0 0 1px rgba(0,209,9,.18)}
.market-caret{position:absolute;right:11px;width:8px;height:8px;border-right:2px solid var(--tv-muted);border-bottom:2px solid var(--tv-muted);transform:rotate(45deg) translateY(-2px);pointer-events:none}
.market-view{min-width:0}
.market-view.hidden{display:none}
.stock-overview-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin:2px 0 10px;flex-wrap:wrap}
.overview-title{display:flex;flex-direction:column;gap:3px}
.overview-title h1{margin:0}
.overview-subtitle{font-size:11px;color:var(--tv-muted)}
.overview-subtitle strong{color:var(--tv-accent)}
.heat-legend{display:flex;align-items:center;gap:8px;color:var(--tv-muted);font-size:10px;font-weight:800}
.heat-scale{width:88px;height:8px;border-radius:999px;background:linear-gradient(90deg,#8f2632,#444,#008a3a)}
.heatmap{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));grid-auto-rows:72px;gap:2px;background:#081018;border:1px solid var(--tv-border);padding:2px;min-height:560px}
.heat-sector{position:relative;display:flex;flex-direction:column;min-height:0;overflow:hidden;background:#050709;border:1px solid #111820}
.heat-sector-title{height:18px;padding:2px 5px;background:#102337;color:#dfe7ef;font-size:10px;font-weight:850;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.heat-sector-grid{flex:1;min-height:0;display:grid;grid-template-columns:repeat(12,minmax(0,1fr));grid-auto-rows:28px;gap:1px;padding:1px;background:#000}
.heat-tile{grid-column:span var(--tile-w,2);grid-row:span var(--tile-h,2);min-height:26px;background:var(--tile-bg,#303a32);color:#fff;text-decoration:none;border:1px solid rgba(0,0,0,.45);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;overflow:hidden;text-align:center;text-shadow:0 1px 2px rgba(0,0,0,.55)}
.heat-tile:hover{outline:1px solid rgba(255,255,255,.65);z-index:2}
.heat-symbol{font-size:clamp(10px,1.45vw,24px);font-weight:900;line-height:1}
.heat-change{font-family:Inter,Arial,sans-serif;font-size:clamp(8px,.8vw,13px);font-weight:800;line-height:1}
.heat-name{max-width:100%;font-size:9px;color:rgba(255,255,255,.74);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.heat-sector:nth-child(1){grid-column:span 4;grid-row:span 4}
.heat-sector:nth-child(2){grid-column:span 3;grid-row:span 3}
.heat-sector:nth-child(3){grid-column:span 3;grid-row:span 3}
.heat-sector:nth-child(4){grid-column:span 2;grid-row:span 3}
.heat-sector:nth-child(5){grid-column:span 3;grid-row:span 3}
.heat-sector:nth-child(6){grid-column:span 3;grid-row:span 3}
.heat-sector:nth-child(n+7){grid-column:span 2;grid-row:span 2}
.commodity-meta{font-size:11px;color:var(--tv-muted);margin:0 0 8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.commodity-meta strong{color:var(--tv-accent)}
.commodity-table-wrap{width:100%;max-width:100%;overflow-x:auto;overflow-y:visible;overscroll-behavior-x:contain;border:1px solid var(--tv-border);background:#000}
.commodity-table{border:0;border-radius:0;border-collapse:separate;border-spacing:0;width:max-content;min-width:940px}
.commodity-table .group-row td{background:rgba(255,255,255,.10);color:#fff;font-size:13px;font-weight:800;padding:9px 8px;border-top:1px solid var(--tv-border)}
.commodity-table th:first-child,
.commodity-table td:first-child{position:sticky;left:0;z-index:5;min-width:220px;max-width:260px;background:#000;white-space:normal}
.commodity-table thead th:first-child{z-index:10;background:var(--tv-panel-2)}
.commodity-table .group-row td:first-child{z-index:5;min-width:auto;max-width:none;background:rgba(255,255,255,.10)}
.commodity-name{font-weight:800;color:var(--tv-text);text-decoration:none}
.commodity-name:hover{color:#fff;text-decoration:underline}
.commodity-unit{color:var(--tv-faint);font-size:10px}
.commodity-price{font-weight:800;color:var(--tv-text);text-align:right;font-family:Inter,Arial,sans-serif}
.commodity-date{color:var(--tv-muted);font-size:10px;white-space:nowrap}
.commodity-empty{border:1px solid var(--tv-border);background:#000;color:var(--tv-muted);padding:18px;font-size:13px}
.market-country{display:inline-flex;align-items:center;gap:6px;color:var(--tv-muted);font-size:10px;font-weight:800;margin-right:8px;text-transform:uppercase}
.market-flag{font-size:12px;line-height:1}
.day-value{font-weight:800;font-family:Inter,Arial,sans-serif}
.day-value.p{color:#00d109}
.day-value.n{color:#ff4d4d}
.day-value .arrow{display:inline-block;margin-right:5px;font-size:12px}
.tabs{display:flex;gap:4px;margin-bottom:8px;border:1px solid var(--tv-border);background:#000;border-radius:0;padding:5px;overflow:auto}
.tab{height:30px;padding:0 12px;font-size:13px;font-weight:700;color:var(--tv-muted);cursor:pointer;border:none;background:transparent;border-radius:4px;position:relative;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--tv-text);background:var(--tv-hover)}
.tab.active{color:#001b03;background:var(--tv-accent)}
.tab.active::after{display:none}
.tab .badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:999px;background:var(--tv-panel-2);color:var(--tv-muted);margin-left:6px;vertical-align:middle;border:1px solid var(--tv-border)}
.tab.active .badge{background:rgba(255,255,255,.14);color:#fff;border-color:rgba(255,255,255,.18)}
.tab-pane{display:none}
.tab-pane.active{display:block}
h1{font-size:20px;font-weight:800;color:#fff;margin-bottom:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;letter-spacing:0}
h1 .hl{font-size:12px;font-weight:600;color:var(--tv-amber)}
.subtitle{font-size:12px;color:var(--tv-muted);margin-bottom:12px}
.subtitle span{color:var(--tv-blue)}
.controls{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:140px;height:31px;padding:0 10px;border-radius:4px;border:1px solid var(--tv-border);background:var(--tv-panel-2);color:var(--tv-text);font-size:12px;outline:none}
.search-box:focus{border-color:var(--tv-blue)}
.cg{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.cg label{font-size:10px;color:var(--tv-faint);margin-right:2px;font-weight:800;text-transform:uppercase;letter-spacing:.2px}
.cb{height:28px;padding:0 9px;border-radius:4px;border:1px solid var(--tv-border);background:var(--tv-panel-2);color:var(--tv-muted);font-size:11px;cursor:pointer;transition:all .12s;white-space:nowrap;font-weight:700}
.cb:hover{background:var(--tv-hover);border-color:var(--tv-border);color:var(--tv-text)}
.cb.active{background:var(--tv-accent);color:#001b03;border-color:var(--tv-accent);font-weight:800}
.stats{font-size:11px;color:var(--tv-muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.stats strong{color:var(--tv-accent)}
table{width:100%;border-collapse:collapse;background:#000;border:1px solid var(--tv-border);border-radius:0;overflow:hidden;font-size:12px}
th{background:var(--tv-panel-2);color:var(--tv-muted);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:8px 6px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--tv-border)}
th:hover{color:var(--tv-text);background:var(--tv-hover)}
th .ar{margin-left:2px;font-size:8px}
th.sa .ar::after{content:" ▲"}
th.sd .ar::after{content:" ▼"}
td{padding:6px;border-top:1px solid var(--tv-border-soft);vertical-align:middle}
tr:hover td{background:var(--tv-hover)}
tr:hover td:first-child{background:var(--tv-hover)}
.rk{width:26px;text-align:center;font-weight:700;color:var(--tv-faint);font-size:11px}
.rk.t3{color:var(--tv-faint)}
.tk{font-weight:800;color:var(--tv-text);font-family:Inter,Arial,sans-serif;font-size:12px}
.tk a,.cn a{color:inherit;text-decoration:none}
.tk a:hover,.cn a:hover{text-decoration:underline;color:#fff}
.cn{color:var(--tv-muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.gc{text-align:right}
.g{font-weight:800;font-family:Inter,Arial,sans-serif;font-size:12px}
.g.p{color:var(--tv-green)}
.g.h{color:var(--tv-amber)}
.g.u{color:var(--tv-red)}
.g.n{color:var(--tv-red)}
.mc{text-align:right}
.m{font-family:Inter,Arial,sans-serif;color:var(--tv-muted);font-size:10px}
.st{display:inline-block;padding:1px 5px;border-radius:4px;background:var(--tv-panel-2);color:var(--tv-muted);font-size:10px;border:1px solid var(--tv-border)}
.pr{text-align:right;font-family:Inter,Arial,sans-serif;font-weight:600;font-size:12px}
.pg{display:flex;justify-content:center;gap:3px;margin-top:14px;flex-wrap:wrap}
.pb{height:26px;padding:0 8px;border-radius:4px;border:1px solid var(--tv-border);background:var(--tv-panel-2);color:var(--tv-muted);cursor:pointer;font-size:11px}
.pb:hover{background:var(--tv-hover);color:var(--tv-text)}
.pb.act{background:var(--tv-accent);color:#001b03;border-color:var(--tv-accent)}
.ft{margin-top:18px;padding-top:10px;border-top:1px solid var(--tv-border);font-size:10px;color:var(--tv-faint);text-align:center}
@media(max-width:768px){
  .site-nav{min-height:58px;padding:10px 14px;gap:10px;flex-wrap:wrap}
  .site-brand{font-size:21px}
  .brand-mark{width:20px;height:24px}
  .nav-toggle{display:flex}
  .nav-links,.nav-search{display:none;flex:0 0 100%;width:100%}
  .nav-check:checked ~ .nav-links{display:flex}
  .nav-check:checked ~ .nav-search{display:block}
  .nav-links{order:3;flex-direction:column;align-items:stretch;gap:4px;padding-top:8px}
  .nav-link{height:40px;display:flex;align-items:center;padding:0 4px;font-size:14px}
  .nav-link.active::after{display:none}
  .nav-market{display:block}
  .market-menu{position:static;opacity:1;visibility:visible;pointer-events:auto;transform:none;box-shadow:none;background:transparent;border:none;padding:0 0 0 12px;margin-top:0}
  .market-menu::before{display:none}
  .market-menu-link{height:34px;font-size:13px}
  .nav-search{order:4;min-width:0;margin-left:0;padding-top:8px}
  .nav-search input{height:40px;font-size:14px}
  .nav-search-results{top:calc(100% + 4px)}
  .container{padding:10px;max-width:100%;overflow:hidden}
  .market-header{align-items:stretch}
  .market-select-wrap{flex:1}
  .market-select{width:100%}
  .market-view{width:100%;max-width:100%;overflow:hidden}
  .stock-overview-head{align-items:flex-start}
  .heatmap{grid-template-columns:1fr;grid-auto-rows:auto;min-height:0;border:0;background:#000;padding:0;gap:8px}
  .heat-sector,.heat-sector:nth-child(n){grid-column:auto;grid-row:auto;border:0}
  .heat-sector-title{height:24px;font-size:11px;padding:5px 7px;background:rgba(255,255,255,.10)}
  .heat-sector-grid{grid-auto-rows:34px}
  .heat-tile{grid-column:span var(--tile-w-mobile,4);grid-row:span 1}
  .heat-symbol{font-size:12px}
  .heat-change{font-size:10px}
  .heat-name{display:none}
  .commodity-table-wrap{width:100%;max-width:100%;overflow-x:auto;overflow-y:visible;border:0}
  .commodity-table{width:max-content;min-width:max-content;border:0;border-collapse:separate;border-spacing:0}
  .commodity-table th,
  .commodity-table td{border:0}
  .commodity-table th:first-child,
  .commodity-table td:first-child{width:164px;min-width:164px;max-width:164px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .commodity-table th:not(:first-child),
  .commodity-table td:not(:first-child){width:76px;min-width:76px;max-width:76px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:clip}
  .commodity-table th:last-child,
  .commodity-table td:last-child{width:58px;min-width:58px;max-width:58px}
  .commodity-table .group-row td:first-child{width:auto;min-width:auto;max-width:none;white-space:normal}
  .commodity-table .commodity-name{display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
  .market-country{margin-right:5px}
  td,th{padding:4px 3px;font-size:10px}
  .cn{max-width:80px}
  .cn,.tk,.g{font-size:10px}
  h1{font-size:15px}
  .tab{padding:8px 12px;font-size:12px}
  .cb{padding:4px 6px;font-size:10px}
  .controls{gap:4px}
}
</style>
</head>

<div class="container">

<select id="marketTypeSelect" hidden aria-hidden="true">
  <option value="stock" selected>Tops</option>
  <option value="commodities">Commodities</option>
  <option value="indexes">Indexes</option>
  <option value="shares">Stock</option>

</select>

<div class="market-view" id="stockMarketView">
  <div class="tabs" id="tabHeaders">

function createApp(mountId, rawData, label, groupKey) {
  const data = rawData;
  let curTime = 'd', curSort = {key:'gain',dir:'desc'}, curSector = 'all', curPage = 1;
  const PP = 9999;
  const container = document.getElementById(mountId);
  container.innerHTML = '<div class="controls">' +
    '<div class="cg"><label>周期</label>' +
    '<button class="cb active" data-t="d">近1日</button><button class="cb" data-t="w">近1周</button>' +
    '<button class="cb" data-t="m">近1月</button>' +
    '<button class="cb" data-t="m2">近2月</button>' +
    '<button class="cb" data-t="q">近3月</button>' +
    '<button class="cb" data-t="h">近半年</button>' +
    '<button class="cb" data-t="y">YTD</button></div>' +
    '<div class="cg"><label>排序</label>' +
    '<button class="cb active" data-s="gain">涨幅</button>' +
    '<button class="cb" data-s="rank">排名</button>' +
    '<button class="cb" data-s="price">股价</button>' +
    '<button class="cb" data-s="mcapNum">市值</button></div>' +
    '<div class="cg"><label>板块</label>' +
    '<button class="cb active" data-f="all">全部</button>' +
    '<button class="cb" data-f="科技">科技</button>' +
    '<button class="cb" data-f="医疗">医疗</button>' +
    '<button class="cb" data-f="工业">工业</button>' +
    '<button class="cb" data-f="能源">能源</button>' +
    '<button class="cb" data-f="金融">金融</button>' +
    '<button class="cb" data-f="基础材料">基础材料</button>' +
    '<button class="cb" data-f="通信">通信</button>' +
    '<button class="cb" data-f="消费周期">消费周期</button>' +
    '<button class="cb" data-f="消费防御">消费防御</button>' +
    '<button class="cb" data-f="公用事业">公用事业</button>' +
    '<button class="cb" data-f="房地产">房地产</button></div>' +
    '<input class="search-box" id="'+mountId+'_srch" placeholder="搜索代码或名称..."></div>' +
    '<div class="stats"><span>共 <strong id="'+mountId+'_cnt">0</strong> 只股票 | 更新于 2026-07-01</span></div>' +
    '<div style="overflow-x:auto"><table><thead><tr>' +
    '<th class="rk" data-sort="rank">#<span class="ar"></span></th>' +
    '<th>代码</th><th>公司名称</th>' +
    '<th class="gc" data-sort="gain">涨幅<span class="ar"></span></th>' +
    '<th class="pr" data-sort="price">股价<span class="ar"></span></th>' +
    '<th class="mc" data-sort="mcapNum">市值<span class="ar"></span></th>' +
    '<th>板块</th></tr></thead>' +
    '<tbody id="'+mountId+'_body"></tbody></table></div>' +
    '<div class="pg" id="'+mountId+'_pg"></div>';
  container.addEventListener('click',function(e){
    var btn=e.target.closest('.cb[data-t]');if(btn){window[mountId+'_setTime'](btn.getAttribute('data-t'));return;}
    btn=e.target.closest('.cb[data-s]');if(btn){window[mountId+'_setSort'](btn.getAttribute('data-s'));return;}
    btn=e.target.closest('.cb[data-f]');if(btn){window[mountId+'_setSector'](btn.getAttribute('data-f'));return;}
    btn=e.target.closest('th[data-sort]');if(btn){window[mountId+'_setSort'](btn.getAttribute('data-sort'));return;}
    btn=e.target.closest('.pb[data-page]');if(btn){window[mountId+'_goPage'](Number(btn.getAttribute('data-page')));return;}
  });
  document.getElementById(mountId+'_srch').addEventListener('input',function(){window[mountId+'_filter']();});
  function getGain(d){var f=curTime==='y'?'y':curTime;return d[f]||0}
  function chartUrl(d){
    return 'stock_chart.html?symbol='+encodeURIComponent(d.t)+
      '&name='+encodeURIComponent(d.n)+
      '&universe='+encodeURIComponent(groupKey)+
      '&metric='+encodeURIComponent(curTime)+
      '&sort='+encodeURIComponent(curSort.key)+
      '&dir='+encodeURIComponent(curSort.dir);
  }
  function render(){
    var arr=[].concat(data);
    var q=document.getElementById(mountId+'_srch').value.toLowerCase().trim();
    if(q)arr=arr.filter(function(d){return d.t.toLowerCase().includes(q)||d.n.toLowerCase().includes(q)});
    if(curSector!=='all')arr=arr.filter(function(d){return d.s===curSector});
    var k=curSort.key,dir=curSort.dir;
    arr.sort(function(a,b){
      if(k==='gain')return dir==='desc'?getGain(b)-getGain(a):getGain(a)-getGain(b);
      if(k==='price')return dir==='desc'?(Number(b.p)||0)-(Number(a.p)||0):(Number(a.p)||0)-(Number(b.p)||0);
      if(k==='mcapNum')return dir==='desc'?b.mn-a.mn:a.mn-b.mn;
      return dir==='asc'?a.r-b.r:b.r-a.r;
    });
    document.getElementById(mountId+'_cnt').textContent=arr.length;
    var tp=Math.ceil(arr.length/PP);
    if(curPage>tp)curPage=tp||1;
    var start=(curPage-1)*PP,page=arr.slice(start,start+PP);
    document.getElementById(mountId+'_body').innerHTML=page.map(function(d,i){
      var pos=start+i+1,g=Number(getGain(d))||0,rc=pos<=3?'rk t3':'rk',ss=g>=0?'+':'';
      var gc=g>=300?'u':(g>=150?'h':(g>=0?'p':'n'));
      var href=chartUrl(d);
      return '<tr><td class="'+rc+'">'+pos+'</td><td class="tk"><a href="'+href+'">'+d.t+'</a></td><td class="cn" title="'+d.n+'"><a href="'+href+'">'+d.n+'</a></td><td class="gc"><span class="g '+gc+'">'+ss+g.toFixed(2)+'%</span></td><td class="pr"><span class="m">'+(d.p?Number(d.p).toFixed(2):'---')+'</span></td><td class="mc"><span class="m">'+(d.mn===0?'---':d.c)+'</span></td><td><span class="st">'+d.s+'</span></td></tr>';
    }).join('');
    var pg=document.getElementById(mountId+'_pg');
    if(tp<=1){pg.innerHTML='';return;}
    var hp='';
    if(curPage>1)hp+='<button class="pb" data-page="'+(curPage-1)+'">&#8249;</button>';
    for(var i=Math.max(1,curPage-2);i<=Math.min(tp,curPage+2);i++)
      hp+='<button class="pb '+(i===curPage?'act':'')+'" data-page="'+i+'">'+i+'</button>';
    if(curPage<tp)hp+='<button class="pb" data-page="'+(curPage+1)+'">&#8250;</button>';
    pg.innerHTML=hp;
  }
  window[mountId+'_goPage']=function(n){curPage=n;render();};
  window[mountId+'_setTime']=function(t){
    curTime=t;curPage=1;
    [].forEach.call(document.querySelectorAll('#'+mountId+' .cb[data-t]'),function(b){b.classList.remove('active')});
    var btn=document.querySelector('#'+mountId+' .cb[data-t="'+t+'"]');
    if(btn)btn.classList.add('active');
    render();
  };
  window[mountId+'_setSort']=function(key){
    var dir=(curSort.key===key&&curSort.dir==='desc')?'asc':'desc';
    curSort={key:key,dir:dir};curPage=1;
    [].forEach.call(document.querySelectorAll('#'+mountId+' .cb[data-s]'),function(b){b.classList.remove('active')});
    var btn=document.querySelector('#'+mountId+' .cb[data-s="'+key+'"]');
    if(btn)btn.classList.add('active');
    render();
  };
  window[mountId+'_setSector']=function(s){
    curSector=s;curPage=1;
    [].forEach.call(document.querySelectorAll('#'+mountId+' .cb[data-f]'),function(b){b.classList.remove('active')});
    var target=document.querySelector('#'+mountId+' .cb[data-f="'+s+'"]');
    if(target)target.classList.add('active');
    render();
  };
  window[mountId+'_filter']=function(){curPage=1;render();};
  render();
}
function switchTab(id){
  [].forEach.call(document.querySelectorAll('.tab'),function(t){t.classList.remove('active')});
  document.querySelector('.tab[data-tab="'+id+'"]').classList.add('active');
  [].forEach.call(document.querySelectorAll('.tab-pane'),function(p){p.classList.remove('active')});
  document.getElementById('pane-'+id).classList.add('active');
}
function setupNavSearch(){
  var form=document.querySelector('.nav-search');
  if(!form)return;
  var input=form.querySelector('input[name="q"]');
  var results=document.createElement('div');
  results.className='nav-search-results';
  form.appendChild(results);
  var rowsCache=null;
  var activeIndex=-1;
  function stockUrl(row){
    var params=new URLSearchParams();
    params.set('symbol',row.symbol||row.t);
    params.set('name',row.name||row.n||row.symbol||row.t);
    return 'stock_chart.html?'+params.toString();
  }
  function normalizeStockRows(source){
    var rows=[], seen={};
    source.forEach(function(row){
      var symbol=String(row.symbol||row.t||'').toUpperCase();
      if(!symbol||seen[symbol])return;
      seen[symbol]=true;
      rows.push({
        symbol:symbol,
        name:row.name||row.n||symbol,
        sector:row.sector||row.s||'',
        marketCap:row.marketCap||row.c||'',
        marketCapNum:Number(row.marketCapNum||row.mn||0),
        price:Number(row.price||row.p||0),
        d:Number(row.d||0)
      });
    });
    return rows;
  }
  function loadSearchRows(){
    if(rowsCache)return Promise.resolve(rowsCache);
    return fetch('market_data/index.json',{cache:'no-store'})
      .then(function(response){if(!response.ok)throw new Error('No stock index');return response.json();})
      .then(function(index){
        var groups=index.groups||{};
        var source=Object.keys(groups).length?Object.values(groups).flatMap(function(group){return group.stocks||[];}):(index.stocks||[]);
        rowsCache=normalizeStockRows(source);
        return rowsCache;
      })
      .catch(function(){
        rowsCache=normalizeStockRows([].concat(r2kRaw,spRaw,ndqRaw));
        return rowsCache;
      });
  }
  function closeResults(){
    results.classList.remove('open');
    results.innerHTML='';
    activeIndex=-1;
  }
  function paintResults(matches){
    if(!matches.length){closeResults();return;}
    results.innerHTML=matches.map(function(row,index){
      var cls=row.d>=0?'up':'down';
      var sign=row.d>0?'+':'';
      return '<button class="nav-result'+(index===activeIndex?' active':'')+'" type="button" data-symbol="'+row.symbol+'">'+
        '<span class="nav-result-symbol">'+row.symbol+'</span>'+
        '<span class="nav-result-name">'+row.name+'</span>'+
        '<span class="nav-result-change '+cls+'">'+sign+row.d.toFixed(2)+'%</span>'+
        '</button>';
    }).join('');
    results.classList.add('open');
  }
  function updateResults(){
    var query=(input.value||'').trim();
    if(!query){closeResults();return;}
    loadSearchRows().then(function(rows){
      var normalized=query.toLowerCase();
      var matches=rows.filter(function(row){
        return row.symbol.toLowerCase().includes(normalized)||String(row.name||'').toLowerCase().includes(normalized);
      }).slice(0,10);
      activeIndex=matches.length?Math.max(0,Math.min(activeIndex,matches.length-1)):-1;
      paintResults(matches);
    });
  }
  function runSearch(){
    var selected=results.querySelector('.nav-result.active')||results.querySelector('.nav-result');
    if(selected){
      loadSearchRows().then(function(rows){
        var match=rows.find(function(row){return row.symbol===selected.dataset.symbol;});
        window.location.href=stockUrl(match||{symbol:selected.dataset.symbol,name:selected.dataset.symbol});
      });
      return;
    }
    var query=(input.value||'').trim();
    if(!query)return;
    window.location.href=stockUrl({symbol:query.toUpperCase(),name:query});
  }
  form.addEventListener('submit',function(event){
    event.preventDefault();
    runSearch();
  });
  input.addEventListener('keydown',function(event){
    var items=results.querySelectorAll('.nav-result');
    if(event.key==='ArrowDown'&&items.length){
      event.preventDefault();
      activeIndex=Math.min(items.length-1,activeIndex+1);
      paintResults([].map.call(items,function(item){return {symbol:item.dataset.symbol,name:item.querySelector('.nav-result-name').textContent,d:Number(item.querySelector('.nav-result-change').textContent.replace('%',''))||0};}));
      return;
    }
    if(event.key==='ArrowUp'&&items.length){
      event.preventDefault();
      activeIndex=Math.max(0,activeIndex-1);
      paintResults([].map.call(items,function(item){return {symbol:item.dataset.symbol,name:item.querySelector('.nav-result-name').textContent,d:Number(item.querySelector('.nav-result-change').textContent.replace('%',''))||0};}));
      return;
    }
    if(event.key==='Escape'){closeResults();return;}
    if(event.key!=='Enter')return;
    event.preventDefault();
    runSearch();
  });
  input.addEventListener('input',updateResults);
  input.addEventListener('focus',updateResults);
  results.addEventListener('mousedown',function(event){
    var button=event.target.closest('.nav-result');
    if(!button)return;
    event.preventDefault();
    loadSearchRows().then(function(rows){
      var row=rows.find(function(item){return item.symbol===button.dataset.symbol;});
      window.location.href=stockUrl(row||{symbol:button.dataset.symbol,name:button.dataset.symbol});
    });
  });
  document.addEventListener('click',function(event){
    if(!form.contains(event.target))closeResults();
  });
}
function stockChartUrl(row){
  var params=new URLSearchParams();
  params.set('symbol',row.symbol);
  params.set('name',row.name||row.symbol);
  return 'stock_chart.html?'+params.toString();
}
function normalizeShares(payload){
  var groups=(payload&&payload.groups)||{};
  var source=Object.keys(groups).length?Object.values(groups).flatMap(function(group){return group.stocks||[];}):((payload&&payload.stocks)||[]);
  var seen={};
  return source.filter(function(row){
    var symbol=String(row.symbol||'').toUpperCase();
    if(!symbol||seen[symbol])return false;
    seen[symbol]=true;
    row.symbol=symbol;
    return true;
  });
}
function heatColor(value){
  var v=Math.max(-6,Math.min(6,Number(value)||0));
  if(Math.abs(v)<.08)return '#3f4542';
  if(v>0){
    var g=Math.round(76+Math.min(1,v/6)*132);
    return 'rgb(0,'+g+',54)';
  }
  var r=Math.round(118+Math.min(1,Math.abs(v)/6)*120);
  return 'rgb('+r+',44,52)';
}
function tileSpan(row,maxCap){
  var cap=Math.max(1,Number(row.marketCapNum||0));
  var weight=Math.sqrt(cap/Math.max(1,maxCap));
  if(weight>.8)return {w:5,h:5,m:6};
  if(weight>.55)return {w:4,h:4,m:5};
  if(weight>.35)return {w:3,h:3,m:4};
  if(weight>.18)return {w:2,h:2,m:3};
  return {w:1,h:2,m:3};
}
function renderSharesOverview(payload){
  var rows=normalizeShares(payload);
  var meta=document.getElementById('sharesMeta');
  var mount=document.getElementById('sharesHeatmap');
  if(!rows.length){
    meta.textContent='Stock overview';
    mount.innerHTML='<div class="commodity-empty">No stock overview data available.</div>';
    return;
  }
  meta.innerHTML='<span>共 <strong>'+rows.length+'</strong> 只股票</span><span>更新于 '+((payload&&payload.updated)||'---')+'</span><span>Source: local US stock universe</span>';
  var order=['科技','通信','消费周期','消费防御','医疗','工业','金融','能源','基础材料','公用事业','房地产','NASDAQ','NYSE','NYSE American','NYSE Arca','IEX','Cboe BZX'];
  var groups=order.map(function(name){
    return {name:name,rows:rows.filter(function(row){return (row.sector||row.exchange)===name;} )};
  }).concat([{name:'Other',rows:rows.filter(function(row){return order.indexOf(row.sector||row.exchange)<0;})}]).filter(function(group){return group.rows.length;});
  var maxCap=Math.max.apply(null,rows.map(function(row){return Number(row.marketCapNum||0);}));
  var html='<div class="heatmap">';
  groups.forEach(function(group){
    var sorted=group.rows.slice().sort(function(a,b){return Number(b.marketCapNum||0)-Number(a.marketCapNum||0);});
    html+='<section class="heat-sector"><div class="heat-sector-title">'+group.name+'</div><div class="heat-sector-grid">';
    sorted.forEach(function(row){
      var span=tileSpan(row,maxCap);
      var change=Number(row.d||0);
      var sign=change>0?'+':'';
      html+='<a class="heat-tile" href="'+stockChartUrl(row)+'" title="'+row.symbol+' · '+(row.name||'')+' · '+sign+change.toFixed(2)+'%" style="--tile-w:'+span.w+';--tile-h:'+span.h+';--tile-w-mobile:'+span.m+';--tile-bg:'+heatColor(change)+'">'+
        '<span class="heat-symbol">'+row.symbol+'</span>'+
        '<span class="heat-change">'+sign+change.toFixed(2)+'%</span>'+
        '<span class="heat-name">'+(row.name||'')+'</span>'+
        '</a>';
    });
    html+='</div></section>';
  });
  html+='</div>';
  mount.innerHTML=html;
}
function fmtCommodityNumber(value, digits){
  if(value===null||value===undefined||Number.isNaN(Number(value)))return '---';
  return Number(value).toLocaleString(undefined,{minimumFractionDigits:digits,maximumFractionDigits:digits});
}
function fmtCommodityPct(value){
  if(value===null||value===undefined||Number.isNaN(Number(value)))return '<span class="g">---</span>';
  var number=Number(value), sign=number>0?'+':'', cls=number>=0?'p':'n';
  return '<span class="g '+cls+'">'+sign+number.toFixed(2)+'%</span>';
}
function fmtMarketDay(value){
  if(value===null||value===undefined||Number.isNaN(Number(value)))return '<span class="day-value">---</span>';
  var number=Number(value), cls=number>=0?'p':'n', arrow=number>=0?'▲':'▼';
  return '<span class="day-value '+cls+'"><span class="arrow">'+arrow+'</span>'+Math.abs(number).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})+'</span>';
}
function commodityChartUrl(row){

  params.set('symbol',row.symbol);
  params.set('name',row.name||row.symbol);

  params.set('metric','d');

  params.set('dir','desc');

}

        '<td class="gc">'+fmtCommodityPct(row.ytd)+'</td>'+

        '<td><span class="commodity-unit">'+(row.unit||'')+'</span></td>'+
        '<td class="commodity-date">'+(row.date||'---')+'</td>'+

function setupMarketType(){
  var select=document.getElementById('marketTypeSelect');
  var stock=document.getElementById('stockMarketView');
  var shares=document.getElementById('sharesMarketView');
  var commodities=document.getElementById('commoditiesMarketView');
  var indexes=document.getElementById('indexesMarketView');
  var loadedShares=false;
  var loadedCommodities=false;
  var loadedIndexes=false;
  function show(value){
    var isShares=value==='shares';
    var isCommodities=value==='commodities';
    var isIndexes=value==='indexes';
    stock.classList.toggle('hidden',isShares||isCommodities||isIndexes);
    shares.classList.toggle('hidden',!isShares);
    commodities.classList.toggle('hidden',!isCommodities);
    indexes.classList.toggle('hidden',!isIndexes);
    document.querySelectorAll('[data-market-menu]').forEach(function(link){
      link.classList.toggle('active',link.dataset.marketMenu===value);
    });
    if(isShares&&!loadedShares){
      loadedShares=true;
      fetch('market_data/index.json',{cache:'no-store'})
        .then(function(response){if(!response.ok)throw new Error('No stock index');return response.json();})
        .then(renderSharesOverview)
        .catch(function(){
          document.getElementById('sharesMeta').textContent='Stock overview';
          document.getElementById('sharesHeatmap').innerHTML='<div class="commodity-empty">Stock overview data has not been generated yet.</div>';
        });
    }
    if(isCommodities&&!loadedCommodities){
      loadedCommodities=true;
      fetch('commodities_data.json',{cache:'no-store'})
        .then(function(response){if(!response.ok)throw new Error('No commodities data');return response.json();})
        .then(renderCommodities)
        .catch(function(){
          document.getElementById('commoditiesMeta').textContent='Commodities';
          document.getElementById('commoditiesTable').innerHTML='<div class="commodity-empty">Commodity data has not been generated yet. Run python update_commodities.py.</div>';
        });
    }
    if(isIndexes&&!loadedIndexes){
      loadedIndexes=true;
      fetch('indexes_data.json',{cache:'no-store'})
        .then(function(response){if(!response.ok)throw new Error('No indexes data');return response.json();})
        .then(renderIndexes)
        .catch(function(){
          document.getElementById('indexesMeta').textContent='Indexes';
          document.getElementById('indexesTable').innerHTML='<div class="commodity-empty">Index data has not been generated yet. Run python update_indexes.py.</div>';
        });
    }
  }
  var initialMarket=new URLSearchParams(window.location.search).get('market');
  if(initialMarket&&select.querySelector('option[value="'+initialMarket+'"]')) select.value=initialMarket;
  select.addEventListener('change',function(){show(select.value);});
  show(select.value);
}
