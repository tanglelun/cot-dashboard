name: Update Calendar data

on:
  workflow_dispatch:
  schedule:
    # Refresh official release calendars daily.
    - cron: "20 7 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update Calendar data
        run: python update_calendar.py

      - name: Commit updated Calendar data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Calendar data"
          file_pattern: "calendar_data.json"
