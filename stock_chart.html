<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Chart</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#0f1923;color:#e0e0e0;padding:16px}
.site-nav{display:flex;align-items:center;gap:8px;max-width:1600px;margin:0 auto 16px;border-bottom:1px solid #1e2d3a}
.site-nav a{display:inline-flex;align-items:center;padding:12px 18px;color:#99aabb;text-decoration:none;font-weight:700;border-bottom:3px solid transparent}
.site-nav a:hover{color:#fff}
.site-nav a.active{color:#4fc3f7;border-bottom-color:#4fc3f7}
.container{max-width:1600px;margin:0 auto}
.page-layout{display:grid;grid-template-columns:282px minmax(0,1fr);gap:14px;align-items:start}
.page-layout.sidebar-collapsed{grid-template-columns:44px minmax(0,1fr)}
.stock-panel{position:sticky;top:12px;height:calc(100vh - 44px);min-height:520px;background:#111d27;border:1px solid #1e2d3a;border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.sidebar-collapsed .stock-panel{align-items:center}
.stock-panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px;border-bottom:1px solid #1e2d3a}
.stock-panel-title{font-size:12px;font-weight:800;color:#d7e2ee;white-space:nowrap}
.icon-btn{width:28px;height:28px;border:1px solid #2a3a4a;background:#1a2a38;color:#99aabb;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-weight:800}
.icon-btn:hover{border-color:#4fc3f7;color:#fff}
.stock-panel-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:0;flex:1}
.sidebar-collapsed .stock-panel-title,.sidebar-collapsed .stock-panel-body{display:none}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;color:#667788;font-weight:800;text-transform:uppercase;letter-spacing:.2px}
.select,.stock-search{width:100%;border:1px solid #2a3a4a;background:#172635;color:#dce8f4;border-radius:5px;padding:7px 8px;font-size:12px;outline:none}
.select:focus,.stock-search:focus{border-color:#4fc3f7}
.stock-nav{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stock-list{min-height:0;overflow:auto;border:1px solid #1e2d3a;border-radius:6px;background:#0f1923}
.stock-row{width:100%;display:grid;grid-template-columns:30px minmax(0,1fr) auto;gap:6px;align-items:center;border:none;border-bottom:1px solid #172635;background:transparent;color:#c7d2de;text-align:left;padding:7px 8px;cursor:pointer}
.stock-row:hover{background:#172635}
.stock-row.active{background:#14344a;color:#fff}
.stock-rank{font-family:"SF Mono","Fira Code",monospace;font-size:10px;color:#667788}
.stock-main{min-width:0}
.stock-symbol{font-family:"SF Mono","Fira Code",monospace;font-size:12px;font-weight:800;color:#4fc3f7}
.stock-name{font-size:10px;color:#7e8d9d;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stock-value{font-family:"SF Mono","Fira Code",monospace;font-size:11px;font-weight:800}
.stock-value.up{color:#4caf50}.stock-value.down{color:#ff5252}
.main-panel{min-width:0}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.identity{display:flex;flex-direction:column;gap:4px}
.symbol-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h1{font-size:24px;color:#fff;font-weight:800;letter-spacing:0}
.name{font-size:13px;color:#99aabb}
.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:#667788}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;background:#1a2d3a;color:#99aabb;font-size:11px}
.price-line{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.last-price{font-family:"SF Mono","Fira Code",monospace;font-size:22px;font-weight:800;color:#e0e0e0}
.change{font-family:"SF Mono","Fira Code",monospace;font-size:14px;font-weight:800}
.change.up{color:#00c853}.change.down{color:#ff5252}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{border:1px solid #2a3a4a;background:#1a2a38;color:#99aabb;border-radius:5px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none}
.btn:hover{border-color:#4fc3f7;color:#fff}
.btn.active{background:#4fc3f7;border-color:#4fc3f7;color:#0f1923}
.mobile-switcher{display:none}
.chart-shell{background:#111d27;border:1px solid #1e2d3a;border-radius:8px;overflow:hidden}
.chart-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #1e2d3a;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ma-legend{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:"SF Mono","Fira Code",monospace;font-size:11px;color:#8899aa}
.ma-item{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.ma-dot{width:18px;height:2px;border-radius:2px;display:inline-block}
.hint{font-size:11px;color:#556677}
.chart-wrap{position:relative;height:68vh;min-height:420px}
canvas{display:block;width:100%;height:100%;cursor:crosshair;touch-action:none}
.status{padding:28px;text-align:center;color:#8899aa;font-size:13px}
.status strong{color:#4fc3f7}
@media(max-width:768px){
  body{padding:10px}
  .site-nav a{padding:10px 12px}
  .page-layout{display:block}
  .stock-panel{position:fixed;left:10px;right:10px;top:62px;bottom:10px;height:auto;min-height:0;z-index:20;box-shadow:0 20px 60px rgba(0,0,0,.45);display:none}
  .stock-panel.open{display:flex}
  .sidebar-collapsed .stock-panel-title,.sidebar-collapsed .stock-panel-body{display:flex}
  .sidebar-collapsed .stock-panel{align-items:stretch}
  .stock-panel-body{display:flex}
  .mobile-switcher{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:0 0 10px}
  .mobile-switcher .select{flex:1;min-width:132px;width:auto}
  h1{font-size:19px}
  .last-price{font-size:18px}
  .chart-wrap{height:62vh;min-height:360px}
  .hint{display:none}
}
</style>
</head>
<body>
<nav class="site-nav" aria-label="Primary">
  <a href="index.html">Non-Commercial</a>
  <a href="russell2000_top100.html" class="active">Maket</a>
</nav>

<main class="container">
  <div class="page-layout" id="pageLayout">
    <aside class="stock-panel" id="stockPanel" aria-label="Stock list">
      <div class="stock-panel-head">
        <span class="stock-panel-title">Stocks</span>
        <button class="icon-btn" id="panelToggle" title="Toggle stock list" aria-label="Toggle stock list">‹</button>
      </div>
      <div class="stock-panel-body">
        <div class="field">
          <label for="universeSelect">Universe</label>
          <select class="select" id="universeSelect"></select>
        </div>
        <div class="field">
          <label for="sortSelect">Sort</label>
          <select class="select" id="sortSelect">
            <option value="gain">Gain</option>
            <option value="rank">Rank</option>
            <option value="price">Price</option>
            <option value="marketCapNum">Market Cap</option>
            <option value="symbol">Symbol</option>
          </select>
        </div>
        <div class="field">
          <label for="metricSelect">Period</label>
          <select class="select" id="metricSelect">
            <option value="d">1D</option>
            <option value="w">1W</option>
            <option value="m">1M</option>
            <option value="m2">2M</option>
            <option value="q">3M</option>
            <option value="h">6M</option>
            <option value="y">YTD</option>
          </select>
        </div>
        <div class="field">
          <label for="directionSelect">Direction</label>
          <select class="select" id="directionSelect">
            <option value="desc">High to low</option>
            <option value="asc">Low to high</option>
          </select>
        </div>
        <input class="stock-search" id="stockSearch" placeholder="Search symbol or name">
        <div class="stock-nav">
          <button class="btn" id="prevStock" type="button">Prev</button>
          <button class="btn" id="nextStock" type="button">Next</button>
        </div>
        <div class="stock-list" id="stockList"></div>
      </div>
    </aside>

    <section class="main-panel">
      <div class="mobile-switcher">
        <button class="btn" id="mobileListToggle" type="button">Stocks</button>
        <select class="select" id="mobileSortSelect" aria-label="Mobile stock sort">
          <option value="gain">Gain</option>
          <option value="rank">Rank</option>
          <option value="price">Price</option>
          <option value="marketCapNum">Market Cap</option>
          <option value="symbol">Symbol</option>
        </select>
        <button class="btn" id="mobilePrevStock" type="button">Prev</button>
        <button class="btn" id="mobileNextStock" type="button">Next</button>
      </div>

  <div class="topbar">
    <div class="identity">
      <div class="symbol-line">
        <h1 id="symbol">---</h1>
        <span class="badge" id="sector">---</span>
        <span class="badge" id="mcap">---</span>
      </div>
      <div class="name" id="name">Loading chart...</div>
      <div class="price-line">
        <span class="last-price" id="lastPrice">--</span>
        <span class="change" id="change">--</span>
      </div>
    </div>
    <div class="actions">
      <a class="btn" href="russell2000_top100.html">Back to Maket</a>
    </div>
  </div>

  <section class="chart-shell">
    <div class="chart-toolbar">
      <div class="toolbar-left">
        <div class="actions" id="ranges">
          <button class="btn" data-range="63">3M</button>
          <button class="btn" data-range="126">6M</button>
          <button class="btn" data-range="252">1Y</button>
          <button class="btn active" data-range="all">All</button>
        </div>
        <div class="ma-legend" id="maLegend"></div>
      </div>
      <div class="hint">Drag to pan · Wheel or pinch to zoom · Move cursor for OHLC</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
      <div class="status" id="status">Loading price data...</div>
    </div>
  </section>
    </section>
  </div>
</main>

<script>
const params = new URLSearchParams(window.location.search);
let currentSymbol = (params.get('symbol') || '').trim().toUpperCase();
let fallbackName = params.get('name') || currentSymbol;
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const pageLayout = document.getElementById('pageLayout');
const stockPanel = document.getElementById('stockPanel');
const stockListEl = document.getElementById('stockList');
const universeSelect = document.getElementById('universeSelect');
const sortSelect = document.getElementById('sortSelect');
const mobileSortSelect = document.getElementById('mobileSortSelect');
const metricSelect = document.getElementById('metricSelect');
const directionSelect = document.getElementById('directionSelect');
const stockSearch = document.getElementById('stockSearch');
const MOVING_AVERAGES = [
  { key:'ma10', label:'MA10', period:10, color:'#ffffff', alpha:0.2 },
  { key:'ma20', label:'MA20', period:20, color:'#4fc3f7', alpha:0.95 },
  { key:'ma50', label:'MA50', period:50, color:'#b07cff', alpha:0.5 },
  { key:'ma200', label:'MA200', period:200, color:'#ff8a65', alpha:0.5 }
];
const UNIVERSE_LABELS = { r2kRaw:'Russell 2000', spRaw:'S&P 500', ndqRaw:'Nasdaq 100', all:'All Stocks' };
const SORT_LABELS = { gain:'Gain', rank:'Rank', price:'Price', marketCapNum:'Market Cap', symbol:'Symbol' };
const DEFAULT_VISIBLE_CANDLES = 220;
const state = {
  candles: [], start: 0, end: 0, hover: -1, dragging: false, dragX: 0, dragStart: 0, dragEnd: 0,
  pinching: false, pinchDistance: 0, pinchStart: 0, pinchEnd: 0, pinchRatio: 0.5,
  marketIndex: null, stockRows: [], activeRange: 'all',
  universe: params.get('universe') || 'r2kRaw',
  metric: params.get('metric') || 'd',
  sortKey: normalizeSortKey(params.get('sort') || 'gain'),
  sortDir: params.get('dir') === 'asc' ? 'asc' : 'desc'
};

document.getElementById('symbol').textContent = currentSymbol || 'UNKNOWN';
document.getElementById('name').textContent = fallbackName || 'Stock chart';
document.title = currentSymbol ? currentSymbol + ' Candlestick Chart' : 'Stock Chart';

function normalizeSortKey(key){
  if(key === 'mcapNum') return 'marketCapNum';
  if(['gain','rank','price','marketCapNum','symbol'].includes(key)) return key;
  return 'gain';
}

function fmt(value, digits=2){
  if(value === null || value === undefined || Number.isNaN(Number(value))) return '--';
  return Number(value).toFixed(digits);
}

function fmtPct(value){
  if(value === null || value === undefined || Number.isNaN(Number(value))) return '--';
  const numeric = Number(value);
  return (numeric >= 0 ? '+' : '') + numeric.toFixed(2) + '%';
}

function setStatus(text){
  statusEl.style.display = text ? 'block' : 'none';
  statusEl.textContent = text || '';
}

function setRange(range){
  const total = state.candles.length;
  const count = range === 'all' ? Math.min(total, DEFAULT_VISIBLE_CANDLES) : Math.min(total, Number(range));
  state.activeRange = range;
  state.end = total;
  state.start = Math.max(0, total - count);
  state.hover = -1;
  document.querySelectorAll('#ranges .btn').forEach(item => item.classList.toggle('active', item.dataset.range === range));
  draw();
}

function renderHeader(data){
  const candles = data.prices;
  const last = candles[candles.length - 1];
  const prev = candles[candles.length - 2] || last;
  const diff = last.close - prev.close;
  const pct = prev.close ? diff / prev.close * 100 : 0;
  const changeEl = document.getElementById('change');
  document.getElementById('symbol').textContent = data.symbol;
  document.getElementById('name').textContent = data.name || fallbackName || data.symbol;
  document.getElementById('sector').textContent = data.sector || 'Sector';
  document.getElementById('mcap').textContent = data.marketCap || 'Market cap';
  document.getElementById('lastPrice').textContent = fmt(last.close);
  changeEl.textContent = (diff >= 0 ? '+' : '') + fmt(diff) + ' (' + (pct >= 0 ? '+' : '') + fmt(pct) + '%)';
  changeEl.className = 'change ' + (diff >= 0 ? 'up' : 'down');
  document.title = data.symbol + ' Candlestick Chart';
}

function resizeCanvas(){
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(rect.width * dpr));
  canvas.height = Math.max(1, Math.floor(rect.height * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

function visibleCandles(){
  return state.candles.slice(state.start, state.end);
}

function calculateMovingAverages(candles){
  MOVING_AVERAGES.forEach(ma => {
    let sum = 0;
    candles.forEach((candle, index) => {
      sum += candle.close;
      if(index >= ma.period) sum -= candles[index - ma.period].close;
      candle[ma.key] = index >= ma.period - 1 ? sum / ma.period : null;
    });
  });
}

function renderMaLegend(candle){
  const target = document.getElementById('maLegend');
  target.innerHTML = MOVING_AVERAGES.map(ma => {
    const value = candle && candle[ma.key] ? fmt(candle[ma.key]) : '--';
    return '<span class="ma-item" style="color:'+ma.color+';opacity:'+ma.alpha+'"><span class="ma-dot" style="background:'+ma.color+'"></span>'+ma.label+' '+value+'</span>';
  }).join('');
}

function drawMovingAverage(ma, candles, xFor, yFor){
  ctx.strokeStyle = ma.color;
  ctx.lineWidth = 1.4;
  ctx.globalAlpha = ma.alpha;
  ctx.beginPath();
  let started = false;
  candles.forEach((candle, index) => {
    const value = candle[ma.key];
    if(!value){
      started = false;
      return;
    }
    const x = xFor(index);
    const y = yFor(value);
    if(!started){
      ctx.moveTo(x, y);
      started = true;
    }else{
      ctx.lineTo(x, y);
    }
  });
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawGrid(left, top, right, priceBottom, volumeTop, bottom, width, height, minPrice, maxPrice, maxVolume, candles, xFor, yFor){
  ctx.strokeStyle = '#1d3040';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#607d8b';
  ctx.font = '11px SF Mono, Fira Code, monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for(let i=0;i<=5;i++){
    const y = top + (priceBottom - top) * i / 5;
    ctx.beginPath();
    ctx.moveTo(left, y);
    ctx.lineTo(width - right, y);
    ctx.stroke();
    const price = maxPrice - (maxPrice - minPrice) * i / 5;
    ctx.fillText(fmt(price), width - 10, y);
  }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const ticks = Math.min(6, candles.length);
  for(let i=0;i<ticks;i++){
    const idx = Math.floor(i * (candles.length - 1) / Math.max(1, ticks - 1));
    const x = xFor(idx);
    ctx.fillText(candles[idx].time.slice(5), x, height - bottom + 8);
  }
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText(maxVolume ? Math.round(maxVolume / 1000000) + 'M' : '', width - 10, volumeTop + 8);
}

function updateHistoryMeta(){
  if(!state.candles.length) return;
  const first = state.candles[0].time;
  const last = state.candles[state.candles.length - 1].time;
  const visible = visibleCandles();
  const shown = visible.length ? visible[0].time + ' to ' + visible[visible.length - 1].time : '--';
  const hint = document.querySelector('.hint');
  if(hint){
    hint.textContent = 'History ' + first + ' to ' + last + ' · Showing ' + shown + ' · Drag to pan · Wheel or pinch to zoom';
  }
}

function draw(){
  const rect = canvas.getBoundingClientRect();
  const width = rect.width;
  const height = rect.height;
  ctx.clearRect(0, 0, width, height);
  const candles = visibleCandles();
  if(!candles.length) return;
  updateHistoryMeta();

  const left = 58, right = 76, top = 22, bottom = 36;
  const volumeHeight = Math.max(64, Math.min(92, height * 0.18));
  const gap = 16;
  const priceBottom = height - bottom - volumeHeight - gap;
  const volumeTop = priceBottom + gap;
  const plotWidth = width - left - right;
  const step = plotWidth / candles.length;
  const bodyWidth = Math.max(2, Math.min(12, step * 0.62));
  const maValues = [];
  candles.forEach(c => MOVING_AVERAGES.forEach(ma => { if(c[ma.key]) maValues.push(c[ma.key]); }));
  const highs = candles.map(c => c.high).concat(maValues);
  const lows = candles.map(c => c.low).concat(maValues);
  let maxPrice = Math.max(...highs);
  let minPrice = Math.min(...lows);
  const pad = (maxPrice - minPrice || maxPrice || 1) * 0.06;
  maxPrice += pad;
  minPrice -= pad;
  const maxVolume = Math.max(...candles.map(c => c.volume || 0), 0);
  const xFor = i => left + i * step + step / 2;
  const yFor = price => top + (maxPrice - price) / (maxPrice - minPrice) * (priceBottom - top);

  drawGrid(left, top, right, priceBottom, volumeTop, bottom, width, height, minPrice, maxPrice, maxVolume, candles, xFor, yFor);

  candles.forEach((c, i) => {
    const x = xFor(i);
    const up = c.close >= c.open;
    const color = up ? '#00c853' : '#ff5252';
    const yOpen = yFor(c.open), yClose = yFor(c.close), yHigh = yFor(c.high), yLow = yFor(c.low);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, yHigh);
    ctx.lineTo(x, yLow);
    ctx.stroke();
    const bodyTop = Math.min(yOpen, yClose);
    const bodyHeight = Math.max(1, Math.abs(yOpen - yClose));
    if(up){
      ctx.strokeRect(x - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight);
    }else{
      ctx.fillRect(x - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight);
    }
    if(maxVolume && c.volume){
      const vh = (c.volume / maxVolume) * (height - bottom - volumeTop);
      ctx.globalAlpha = 0.35;
      ctx.fillRect(x - bodyWidth / 2, height - bottom - vh, bodyWidth, vh);
      ctx.globalAlpha = 1;
    }
  });

  MOVING_AVERAGES.forEach(ma => drawMovingAverage(ma, candles, xFor, yFor));

  if(state.hover >= state.start && state.hover < state.end){
    const local = state.hover - state.start;
    const c = state.candles[state.hover];
    const x = xFor(local);
    const y = yFor(c.close);
    ctx.strokeStyle = '#4fc3f7';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(x, top);
    ctx.lineTo(x, height - bottom);
    ctx.moveTo(left, y);
    ctx.lineTo(width - right, y);
    ctx.stroke();
    ctx.setLineDash([]);

    const lines = [
      c.time + '  ' + currentSymbol,
      'O ' + fmt(c.open) + '  H ' + fmt(c.high),
      'L ' + fmt(c.low) + '  C ' + fmt(c.close),
      'MA10 ' + fmt(c.ma10) + '  MA20 ' + fmt(c.ma20),
      'MA50 ' + fmt(c.ma50) + '  MA200 ' + fmt(c.ma200),
      'Vol ' + (c.volume ? Math.round(c.volume / 1000000) + 'M' : '--')
    ];
    const boxW = 228, boxH = 112;
    const boxX = Math.min(width - right - boxW, Math.max(left, x + 12));
    const boxY = top + 8;
    ctx.fillStyle = 'rgba(15,25,35,0.92)';
    ctx.strokeStyle = '#2a3a4a';
    ctx.fillRect(boxX, boxY, boxW, boxH);
    ctx.strokeRect(boxX, boxY, boxW, boxH);
    ctx.fillStyle = '#c0d0e0';
    ctx.font = '11px SF Mono, Fira Code, monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    lines.forEach((line, i) => ctx.fillText(line, boxX + 10, boxY + 9 + i * 16));
  }
  renderMaLegend(state.hover >= state.start && state.hover < state.end ? state.candles[state.hover] : state.candles[state.end - 1]);
}

function nearestIndex(clientX){
  const rect = canvas.getBoundingClientRect();
  const left = 58, right = 76;
  const candles = visibleCandles();
  const step = (rect.width - left - right) / Math.max(1, candles.length);
  const local = Math.max(0, Math.min(candles.length - 1, Math.floor((clientX - rect.left - left) / step)));
  return state.start + local;
}

function beginDrag(clientX){
  state.dragging = true;
  state.pinching = false;
  state.dragX = clientX;
  state.dragStart = state.start;
  state.dragEnd = state.end;
}

function updateDrag(clientX){
  if(!state.dragging) return;
  const rect = canvas.getBoundingClientRect();
  const count = state.dragEnd - state.dragStart;
  const step = (rect.width - 58 - 76) / Math.max(1, count);
  const shift = Math.round((state.dragX - clientX) / step);
  let start = state.dragStart + shift;
  start = Math.max(0, Math.min(state.candles.length - count, start));
  state.start = start;
  state.end = start + count;
}

function endGesture(){
  state.dragging = false;
  state.pinching = false;
}

function touchDistance(touches){
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.max(1, Math.hypot(dx, dy));
}

function touchMidX(touches){
  return (touches[0].clientX + touches[1].clientX) / 2;
}

function beginPinch(touches){
  const rect = canvas.getBoundingClientRect();
  state.pinching = true;
  state.dragging = false;
  state.pinchDistance = touchDistance(touches);
  state.pinchStart = state.start;
  state.pinchEnd = state.end;
  state.pinchRatio = Math.max(0, Math.min(1, (touchMidX(touches) - rect.left - 58) / Math.max(1, rect.width - 58 - 76)));
}

function updatePinch(touches){
  if(!state.pinching || !state.candles.length) return;
  const total = state.candles.length;
  const startCount = state.pinchEnd - state.pinchStart;
  const scale = state.pinchDistance / touchDistance(touches);
  const next = Math.max(20, Math.min(total, Math.round(startCount * scale)));
  const center = state.pinchStart + startCount * state.pinchRatio;
  let start = Math.round(center - next * state.pinchRatio);
  start = Math.max(0, Math.min(total - next, start));
  state.start = start;
  state.end = start + next;
  state.hover = -1;
}

canvas.addEventListener('mousemove', event => {
  if(state.dragging){
    updateDrag(event.clientX);
  }else{
    state.hover = nearestIndex(event.clientX);
  }
  draw();
});

canvas.addEventListener('mouseleave', () => {
  state.hover = -1;
  endGesture();
  draw();
});

canvas.addEventListener('mousedown', event => {
  beginDrag(event.clientX);
});

window.addEventListener('mouseup', endGesture);

canvas.addEventListener('touchstart', event => {
  if(event.touches.length === 1){
    beginDrag(event.touches[0].clientX);
    state.hover = nearestIndex(event.touches[0].clientX);
  }else if(event.touches.length >= 2){
    beginPinch(event.touches);
  }
  event.preventDefault();
}, { passive:false });

canvas.addEventListener('touchmove', event => {
  if(event.touches.length >= 2){
    updatePinch(event.touches);
  }else if(event.touches.length === 1){
    updateDrag(event.touches[0].clientX);
    state.hover = nearestIndex(event.touches[0].clientX);
  }
  draw();
  event.preventDefault();
}, { passive:false });

canvas.addEventListener('touchend', event => {
  if(event.touches.length >= 2){
    beginPinch(event.touches);
  }else if(event.touches.length === 1){
    beginDrag(event.touches[0].clientX);
  }else{
    endGesture();
  }
  event.preventDefault();
}, { passive:false });

canvas.addEventListener('wheel', event => {
  event.preventDefault();
  const total = state.candles.length;
  const current = state.end - state.start;
  const rect = canvas.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left - 58) / Math.max(1, rect.width - 58 - 76)));
  const center = state.start + current * ratio;
  const next = Math.max(20, Math.min(total, Math.round(current * (event.deltaY > 0 ? 1.18 : 0.84))));
  let start = Math.round(center - next * ratio);
  start = Math.max(0, Math.min(total - next, start));
  state.start = start;
  state.end = start + next;
  draw();
}, { passive:false });

document.getElementById('ranges').addEventListener('click', event => {
  const button = event.target.closest('button[data-range]');
  if(!button) return;
  setRange(button.dataset.range);
});

function rowSymbol(row){ return (row.symbol || row.t || '').toUpperCase(); }
function rowName(row){ return row.name || row.n || rowSymbol(row); }
function rowSector(row){ return row.sector || row.s || 'Sector'; }
function rowMarketCap(row){ return row.marketCap || row.c || 'Market cap'; }
function rowPrice(row){ return Number(row.price ?? row.p ?? 0); }
function rowMarketCapNum(row){ return Number(row.marketCapNum ?? row.mn ?? 0); }
function rowRank(row){ return Number(row.rank ?? row.r ?? 9999); }
function rowMetric(row){ return Number(row[state.metric] ?? 0); }

function groupEntries(){
  const groups = state.marketIndex && state.marketIndex.groups ? state.marketIndex.groups : {};
  const entries = Object.keys(groups).map(key => ({ key, label: groups[key].label || UNIVERSE_LABELS[key] || key }));
  if(entries.length) entries.push({ key:'all', label:'All Stocks' });
  return entries.length ? entries : [{ key:'all', label:'All Stocks' }];
}

function getBaseRows(){
  const index = state.marketIndex || {};
  const groups = index.groups || {};
  if(state.universe !== 'all' && groups[state.universe] && groups[state.universe].stocks){
    return groups[state.universe].stocks;
  }
  const source = Object.keys(groups).length
    ? Object.values(groups).flatMap(group => group.stocks || [])
    : (index.stocks || []);
  const seen = new Set();
  return source.filter(row => {
    const symbol = rowSymbol(row);
    if(!symbol || seen.has(symbol)) return false;
    seen.add(symbol);
    return true;
  });
}

function getSortValue(row){
  if(state.sortKey === 'gain') return rowMetric(row);
  if(state.sortKey === 'rank') return rowRank(row);
  if(state.sortKey === 'price') return rowPrice(row);
  if(state.sortKey === 'marketCapNum') return rowMarketCapNum(row);
  return rowSymbol(row);
}

function sortedRows(){
  const query = stockSearch.value.trim().toLowerCase();
  let rows = getBaseRows();
  if(query){
    rows = rows.filter(row => rowSymbol(row).toLowerCase().includes(query) || rowName(row).toLowerCase().includes(query));
  }
  rows = rows.slice().sort((a,b) => {
    const av = getSortValue(a);
    const bv = getSortValue(b);
    if(typeof av === 'string' || typeof bv === 'string'){
      return state.sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    }
    return state.sortDir === 'asc' ? av - bv : bv - av;
  });
  return rows;
}

function valueLabel(row){
  if(state.sortKey === 'gain') return fmtPct(rowMetric(row));
  if(state.sortKey === 'rank') return '#' + rowRank(row);
  if(state.sortKey === 'price') return fmt(rowPrice(row));
  if(state.sortKey === 'marketCapNum') return rowMarketCap(row);
  return rowSymbol(row);
}

function syncControls(){
  const entries = groupEntries();
  if(!entries.some(entry => entry.key === state.universe)) state.universe = entries[0].key;
  universeSelect.innerHTML = entries.map(entry => '<option value="'+entry.key+'">'+entry.label+'</option>').join('');
  universeSelect.value = state.universe;
  sortSelect.value = state.sortKey;
  mobileSortSelect.value = state.sortKey;
  metricSelect.value = state.metric;
  directionSelect.value = state.sortDir;
}

function renderStockList(){
  syncControls();
  state.stockRows = sortedRows();
  const currentIndex = state.stockRows.findIndex(row => rowSymbol(row) === currentSymbol);
  stockListEl.innerHTML = state.stockRows.map((row, index) => {
    const symbol = rowSymbol(row);
    const active = symbol === currentSymbol ? ' active' : '';
    const value = valueLabel(row);
    const numeric = state.sortKey === 'gain' ? rowMetric(row) : null;
    const valueClass = numeric === null ? '' : (numeric >= 0 ? ' up' : ' down');
    return '<button class="stock-row'+active+'" data-symbol="'+symbol+'" type="button">' +
      '<span class="stock-rank">'+(index + 1)+'</span>' +
      '<span class="stock-main"><span class="stock-symbol">'+symbol+'</span><span class="stock-name">'+rowName(row)+'</span></span>' +
      '<span class="stock-value'+valueClass+'">'+value+'</span>' +
      '</button>';
  }).join('');
  if(currentIndex >= 0){
    const active = stockListEl.querySelector('.stock-row.active');
    if(active) active.scrollIntoView({ block:'nearest' });
  }
}

function currentRow(){
  return state.stockRows.find(row => rowSymbol(row) === currentSymbol);
}

function updateUrl(row){
  const next = new URLSearchParams();
  next.set('symbol', currentSymbol);
  next.set('name', rowName(row || currentRow() || { symbol: currentSymbol, name: fallbackName }));
  next.set('universe', state.universe);
  next.set('metric', state.metric);
  next.set('sort', state.sortKey);
  next.set('dir', state.sortDir);
  window.history.replaceState(null, '', window.location.pathname + '?' + next.toString());
}

async function switchStock(symbol){
  const row = state.stockRows.find(item => rowSymbol(item) === symbol);
  currentSymbol = symbol;
  fallbackName = row ? rowName(row) : symbol;
  renderStockList();
  updateUrl(row);
  await loadChart();
  stockPanel.classList.remove('open');
}

function moveStock(offset){
  if(!state.stockRows.length) return;
  let index = state.stockRows.findIndex(row => rowSymbol(row) === currentSymbol);
  if(index < 0) index = 0;
  const next = Math.max(0, Math.min(state.stockRows.length - 1, index + offset));
  switchStock(rowSymbol(state.stockRows[next]));
}

function setupStockControls(){
  document.getElementById('panelToggle').addEventListener('click', () => {
    if(window.matchMedia('(max-width: 768px)').matches){
      stockPanel.classList.toggle('open');
    }else{
      pageLayout.classList.toggle('sidebar-collapsed');
      document.getElementById('panelToggle').textContent = pageLayout.classList.contains('sidebar-collapsed') ? '›' : '‹';
      setTimeout(resizeCanvas, 80);
    }
  });
  document.getElementById('mobileListToggle').addEventListener('click', () => stockPanel.classList.toggle('open'));
  stockListEl.addEventListener('click', event => {
    const button = event.target.closest('.stock-row[data-symbol]');
    if(button) switchStock(button.dataset.symbol);
  });
  universeSelect.addEventListener('change', () => { state.universe = universeSelect.value; renderStockList(); updateUrl(currentRow()); });
  sortSelect.addEventListener('change', () => { state.sortKey = normalizeSortKey(sortSelect.value); renderStockList(); updateUrl(currentRow()); });
  mobileSortSelect.addEventListener('change', () => { state.sortKey = normalizeSortKey(mobileSortSelect.value); renderStockList(); updateUrl(currentRow()); });
  metricSelect.addEventListener('change', () => { state.metric = metricSelect.value; renderStockList(); updateUrl(currentRow()); });
  directionSelect.addEventListener('change', () => { state.sortDir = directionSelect.value === 'asc' ? 'asc' : 'desc'; renderStockList(); updateUrl(currentRow()); });
  stockSearch.addEventListener('input', renderStockList);
  document.getElementById('prevStock').addEventListener('click', () => moveStock(-1));
  document.getElementById('nextStock').addEventListener('click', () => moveStock(1));
  document.getElementById('mobilePrevStock').addEventListener('click', () => moveStock(-1));
  document.getElementById('mobileNextStock').addEventListener('click', () => moveStock(1));
}

async function loadMarketIndex(){
  try{
    const response = await fetch('market_data/index.json', { cache:'no-store' });
    if(!response.ok) throw new Error('No market index');
    state.marketIndex = await response.json();
  }catch(error){
    state.marketIndex = { stocks: currentSymbol ? [{ symbol: currentSymbol, name: fallbackName }] : [] };
  }
  setupStockControls();
  renderStockList();
}

async function loadChart(){
  if(!currentSymbol){
    setStatus('Missing stock symbol.');
    return;
  }
  try{
    setStatus('Loading price data...');
    const response = await fetch('market_data/' + encodeURIComponent(currentSymbol) + '.json', { cache:'no-store' });
    if(!response.ok) throw new Error('No chart data found for ' + currentSymbol);
    const data = await response.json();
    if(!data.prices || !data.prices.length) throw new Error('Chart data is empty for ' + currentSymbol);
    currentSymbol = data.symbol;
    fallbackName = data.name || fallbackName || currentSymbol;
    state.candles = data.prices;
    calculateMovingAverages(state.candles);
    renderHeader(data);
    setStatus('');
    setRange(state.activeRange || 'all');
  }catch(error){
    setStatus(error.message || 'Unable to load chart data.');
  }
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
loadMarketIndex();
loadChart();
</script>
</body>
</html>
