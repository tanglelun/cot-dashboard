<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Chart</title>
<style>
:root{
  --tv-bg:#000;
  --tv-panel:#050709;
  --tv-panel-2:#090d12;
  --tv-border:#202932;
  --tv-border-soft:#111820;
  --tv-text:#d1d4dc;
  --tv-muted:#787b86;
  --tv-faint:#5d606b;
  --tv-blue:#2962ff;
  --tv-blue-soft:#1e3a8a;
  --tv-green:#26a69a;
  --tv-red:#ef5350;
  --tv-hover:#101820;
  --tv-accent:#00d109;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--tv-bg);color:var(--tv-text);padding:0}
.site-nav{min-height:64px;display:flex;align-items:center;gap:28px;padding:0 24px;background:#000;border-bottom:1px solid #1b1f2a;position:relative;z-index:30}
.site-brand{display:inline-flex;align-items:center;gap:10px;color:#fff;text-decoration:none;font-size:25px;font-weight:800;letter-spacing:0;white-space:nowrap}
.brand-mark{position:relative;width:22px;height:26px;display:inline-block}
.brand-mark::before{content:"";position:absolute;left:7px;top:1px;width:10px;height:24px;background:#fff;border-radius:10px 10px 10px 1px;transform:skew(-18deg) rotate(22deg);transform-origin:center}
.brand-mark::after{content:"";position:absolute;left:2px;bottom:2px;width:13px;height:3px;background:#fff;border-radius:999px;transform:rotate(-34deg)}
.nav-check{position:absolute;opacity:0;pointer-events:none}
.nav-toggle{display:none;width:38px;height:38px;border:1px solid #2a2e39;border-radius:999px;align-items:center;justify-content:center;flex-direction:column;gap:4px;cursor:pointer;margin-left:auto}
.nav-toggle span{width:16px;height:2px;background:#fff;border-radius:999px}
.nav-links{display:flex;align-items:center;gap:28px;flex:0 1 auto}
.nav-link{position:relative;color:#f3f4f6;text-decoration:none;font-size:15px;font-weight:650;white-space:nowrap}
.nav-link:hover{color:#b8ff00}
.nav-link.active{color:#b8ff00}
.nav-link.active::after{display:none}
.nav-search{position:relative;flex:0 1 360px;min-width:220px;margin-left:auto}
.nav-search input{width:100%;height:42px;border:1px solid #2a2e39;border-radius:999px;background:#090c12;color:#fff;padding:0 16px 0 42px;font-size:15px;font-weight:650;outline:none}
.nav-search input::placeholder{color:#787b86}
.nav-search input:focus{border-color:#b8ff00;box-shadow:0 0 0 1px rgba(184,255,0,.24)}
.nav-search-mark{position:absolute;left:16px;top:50%;width:13px;height:13px;border:2px solid #b8ff00;border-radius:50%;transform:translateY(-50%);pointer-events:none}
.nav-search-mark::after{content:"";position:absolute;width:7px;height:2px;background:#b8ff00;border-radius:999px;right:-6px;bottom:-4px;transform:rotate(45deg)}
.container{width:100%;max-width:none;margin:0;padding:10px clamp(10px,1vw,24px)}
.page-layout{display:grid;grid-template-columns:clamp(292px,16vw,360px) minmax(0,1fr) clamp(190px,11vw,240px);gap:0;align-items:stretch;border:1px solid var(--tv-border);background:#000}
.page-layout.sidebar-collapsed{grid-template-columns:44px minmax(0,1fr) clamp(190px,11vw,240px)}
.stock-panel{position:sticky;top:10px;height:calc(100vh - 84px);min-height:520px;background:#050709;border:none;border-right:1px solid var(--tv-border);border-radius:0;overflow:hidden;display:flex;flex-direction:column}
.sidebar-collapsed .stock-panel{align-items:center}
.stock-panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;height:38px;padding:0 10px;border-bottom:1px solid var(--tv-border)}
.stock-panel-title{font-size:12px;font-weight:800;color:var(--tv-text);white-space:nowrap}
.icon-btn{width:26px;height:26px;border:1px solid transparent;background:transparent;color:var(--tv-muted);border-radius:4px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-weight:800}
.icon-btn:hover{background:var(--tv-hover);color:var(--tv-text)}
.stock-panel-body{padding:8px;display:flex;flex-direction:column;gap:8px;min-height:0;flex:1}
.sidebar-collapsed .stock-panel-title,.sidebar-collapsed .stock-panel-body{display:none}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;color:var(--tv-muted);font-weight:800;text-transform:uppercase;letter-spacing:.2px}
.select,.stock-search{width:100%;border:1px solid var(--tv-border);background:var(--tv-panel-2);color:var(--tv-text);border-radius:4px;padding:7px 8px;font-size:12px;outline:none}
.select:focus,.stock-search:focus{border-color:var(--tv-blue)}
.stock-nav{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stock-list{min-height:0;overflow:auto;border:1px solid var(--tv-border);border-radius:4px;background:var(--tv-panel-2)}
.stock-row{width:100%;display:grid;grid-template-columns:30px minmax(0,1fr) auto;gap:6px;align-items:center;border:none;border-bottom:1px solid var(--tv-border-soft);background:transparent;color:var(--tv-text);text-align:left;padding:7px 8px;cursor:pointer}
.stock-row:hover{background:var(--tv-hover)}
.stock-row.active{background:#1b2b55;color:#fff;box-shadow:inset 2px 0 0 var(--tv-blue)}
.stock-rank{font-family:"SF Mono","Fira Code",monospace;font-size:10px;color:var(--tv-muted)}
.stock-main{min-width:0}
.stock-symbol{font-family:"SF Mono","Fira Code",monospace;font-size:12px;font-weight:800;color:var(--tv-text)}
.stock-name{font-size:10px;color:var(--tv-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stock-value{font-family:"SF Mono","Fira Code",monospace;font-size:11px;font-weight:800}
.stock-value.up{color:var(--tv-green)}.stock-value.down{color:var(--tv-red)}
.main-panel{min-width:0;min-height:calc(100vh - 86px);display:flex;flex-direction:column;background:#000}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin:0;min-height:58px;padding:8px 12px;background:#000;border:none;border-bottom:1px solid var(--tv-border);border-radius:0;flex-wrap:wrap}
.identity{display:flex;flex-direction:column;gap:4px}
.symbol-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h1{font-size:22px;color:#fff;font-weight:800;letter-spacing:0}
.name{font-size:13px;color:var(--tv-muted)}
.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--tv-muted)}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;background:var(--tv-panel-2);border:1px solid var(--tv-border);color:var(--tv-muted);font-size:11px}
.price-line{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.last-price{font-family:"SF Mono","Fira Code",monospace;font-size:22px;font-weight:800;color:var(--tv-text)}
.change{font-family:"SF Mono","Fira Code",monospace;font-size:14px;font-weight:800}
.change.up{color:var(--tv-green)}.change.down{color:var(--tv-red)}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{border:1px solid var(--tv-border);background:var(--tv-panel-2);color:var(--tv-muted);border-radius:4px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none}
.btn:hover{background:var(--tv-hover);color:var(--tv-text)}
.btn.active{background:var(--tv-accent);border-color:var(--tv-accent);color:#001b03}
.mobile-switcher{display:none}
.chart-shell{background:#000;border:none;border-radius:0;overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:520px}
.chart-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--tv-border);flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.candle-readout{display:flex;align-items:center;gap:10px;flex-wrap:wrap;width:100%;padding-top:2px;font-family:"SF Mono","Fira Code",monospace;font-size:12px;color:var(--tv-muted)}
.candle-readout strong{color:var(--tv-text)}
.candle-readout span{white-space:nowrap}
.candle-readout .close-price,.candle-readout .price-change{font-weight:800}
.candle-readout .up{color:var(--tv-green)}
.candle-readout .down{color:var(--tv-red)}
.ma-group{display:flex;align-items:center;gap:6px;min-height:22px}
.ma-toggle{width:22px;height:22px;border:1px solid transparent;background:transparent;color:var(--tv-muted);border-radius:4px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-family:"SF Mono","Fira Code",monospace;font-size:13px;font-weight:800;line-height:1}
.ma-toggle:hover{background:var(--tv-hover);color:var(--tv-text)}
.ma-legend{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:"SF Mono","Fira Code",monospace;font-size:11px;color:var(--tv-muted)}
.ma-group.collapsed .ma-legend{display:none}
.ma-item{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.ma-dot{width:18px;height:2px;border-radius:2px;display:inline-block}
.hint{font-size:11px;color:var(--tv-faint)}
.chart-wrap{position:relative;flex:1;min-height:0}
canvas{position:absolute;inset:0;display:block;width:100%;height:100%;cursor:crosshair;touch-action:none}
.status{padding:28px;text-align:center;color:var(--tv-muted);font-size:13px}
.status strong{color:var(--tv-blue)}
.indicator-panel{position:sticky;top:10px;height:calc(100vh - 84px);min-height:520px;background:#050709;border-left:1px solid var(--tv-border);display:flex;flex-direction:column}
.indicator-head{height:52px;display:flex;align-items:center;padding:0 14px;border-bottom:1px solid var(--tv-border);font-size:14px;font-weight:850;color:#fff}
.indicator-list{padding:14px 14px 8px;display:flex;flex-direction:column;gap:16px}
.indicator-item{display:grid;grid-template-columns:12px minmax(0,1fr);gap:8px;align-items:center;color:var(--tv-text);font-size:12px;font-weight:800}
.indicator-dot{width:7px;height:7px;border-radius:50%;background:var(--tv-muted)}
.indicator-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:768px){
  .site-nav{min-height:58px;padding:10px 14px;gap:10px;flex-wrap:wrap}
  .site-brand{font-size:21px}
  .brand-mark{width:20px;height:24px}
  .nav-toggle{display:flex}
  .nav-links,.nav-search{display:none;flex:0 0 100%;width:100%}
  .nav-check:checked ~ .nav-links{display:flex}
  .nav-check:checked ~ .nav-search{display:block}
  .nav-links{order:3;flex-direction:column;align-items:stretch;gap:4px;padding-top:8px}
  .nav-link{height:40px;display:flex;align-items:center;padding:0 4px;font-size:14px}
  .nav-link.active::after{display:none}
  .nav-search{order:4;min-width:0;margin-left:0;padding-top:8px}
  .nav-search input{height:40px;font-size:14px}
  .container{padding:10px}
  .page-layout{display:block}
  .main-panel{min-height:calc(100dvh - 78px)}
  .stock-panel{position:fixed;left:10px;right:10px;top:78px;bottom:10px;height:auto;min-height:0;z-index:20;box-shadow:0 20px 60px rgba(0,0,0,.45);display:none}
  .stock-panel.open{display:flex}
  .sidebar-collapsed .stock-panel-title,.sidebar-collapsed .stock-panel-body{display:flex}
  .sidebar-collapsed .stock-panel{align-items:stretch}
  .stock-panel-body{display:flex}
  .mobile-switcher{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin:0 0 10px}
  .mobile-switcher .select{flex:1;min-width:132px;width:auto}
  h1{font-size:19px}
  .last-price{font-size:18px}
  .candle-readout{font-size:11px;gap:7px;line-height:1.45}
  .chart-shell{min-height:calc(100dvh - 168px)}
  .chart-wrap{min-height:0}
  .indicator-panel{display:none}
  .hint{display:none}
}
</style>
</head>
<body>
<nav class="site-nav" aria-label="Primary">
  <a class="site-brand" href="index.html" aria-label="Net Data home"><span class="brand-mark" aria-hidden="true"></span><span>Net Data</span></a>
  <input class="nav-check" type="checkbox" id="navMenu">
  <label class="nav-toggle" for="navMenu" aria-label="Toggle navigation"><span></span><span></span><span></span></label>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Non-Commercial</a>
    <a class="nav-link active" href="russell2000_top100.html">Market</a>
    <a class="nav-link" href="economy.html">Economy</a>
  </div>
  <form class="nav-search" role="search" data-root="">
    <span class="nav-search-mark" aria-hidden="true"></span>
    <input type="search" name="q" placeholder="Search stocks" autocomplete="off" aria-label="Search stocks">
  </form>
</nav>

<main class="container">
  <div class="page-layout" id="pageLayout">
    <aside class="stock-panel" id="stockPanel" aria-label="Stock list">
      <div class="stock-panel-head">
        <span class="stock-panel-title">Stocks</span>
        <button class="icon-btn" id="panelToggle" title="Toggle stock list" aria-label="Toggle stock list">‹</button>
      </div>
      <div class="stock-panel-body">
        <div class="field">
          <label for="universeSelect">Universe</label>
          <select class="select" id="universeSelect"></select>
        </div>
        <div class="field">
          <label for="sortSelect">Sort</label>
          <select class="select" id="sortSelect">
            <option value="gain">Gain</option>
            <option value="rank">Rank</option>
            <option value="price">Price</option>
            <option value="marketCapNum">Market Cap</option>
            <option value="symbol">Symbol</option>
          </select>
        </div>
        <div class="field">
          <label for="metricSelect">Period</label>
          <select class="select" id="metricSelect">
            <option value="d">1D</option>
            <option value="w">1W</option>
            <option value="m">1M</option>
            <option value="m2">2M</option>
            <option value="q">3M</option>
            <option value="h">6M</option>
            <option value="y">YTD</option>
          </select>
        </div>
        <div class="field">
          <label for="directionSelect">Direction</label>
          <select class="select" id="directionSelect">
            <option value="desc">High to low</option>
            <option value="asc">Low to high</option>
          </select>
        </div>
        <input class="stock-search" id="stockSearch" placeholder="Search symbol or name">
        <div class="stock-nav">
          <button class="btn" id="prevStock" type="button">Prev</button>
          <button class="btn" id="nextStock" type="button">Next</button>
        </div>
        <div class="stock-list" id="stockList"></div>
      </div>
    </aside>

    <section class="main-panel">
      <div class="mobile-switcher">
        <button class="btn" id="mobileListToggle" type="button">Stocks</button>
        <select class="select" id="mobileSortSelect" aria-label="Mobile stock sort">
          <option value="gain">Gain</option>
          <option value="rank">Rank</option>
          <option value="price">Price</option>
          <option value="marketCapNum">Market Cap</option>
          <option value="symbol">Symbol</option>
        </select>
        <button class="btn" id="mobilePrevStock" type="button">Prev</button>
        <button class="btn" id="mobileNextStock" type="button">Next</button>
      </div>

  <div class="topbar">
    <div class="identity">
      <div class="symbol-line">
        <h1 id="symbol">---</h1>
        <span class="badge" id="sector">---</span>
        <span class="badge" id="mcap">---</span>
      </div>
      <div class="name" id="name">Loading chart...</div>
      <div class="price-line">
        <span class="last-price" id="lastPrice">--</span>
        <span class="change" id="change">--</span>
      </div>
    </div>
    <div class="actions">
      <a class="btn" href="russell2000_top100.html">Back to Market</a>
    </div>
  </div>

  <section class="chart-shell">
    <div class="chart-toolbar">
      <div class="toolbar-left">
        <div class="actions" id="ranges">
          <button class="btn" data-range="63">3M</button>
          <button class="btn" data-range="126">6M</button>
          <button class="btn" data-range="252">1Y</button>
          <button class="btn active" data-range="all">All</button>
        </div>
        <div class="ma-group" id="maGroup">
          <button class="ma-toggle" id="maToggle" type="button" aria-label="Collapse moving averages" aria-expanded="true" title="Collapse moving averages">-</button>
          <div class="ma-legend" id="maLegend"></div>
        </div>
      </div>
      <div class="hint">Drag to pan · Wheel or pinch to zoom · Move cursor for OHLC</div>
      <div class="candle-readout" id="candleReadout">Select a candlestick</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
      <div class="status" id="status">Loading price data...</div>
    </div>
  </section>
    </section>
    <aside class="indicator-panel" aria-label="Indicators">
      <div class="indicator-head">Indicators</div>
      <div class="indicator-list">
        <div class="indicator-item"><span class="indicator-dot" style="background:#5d606b"></span><span class="indicator-name">Price</span></div>
        <div class="indicator-item"><span class="indicator-dot" style="background:#ffffff"></span><span class="indicator-name">MA(10)</span></div>
        <div class="indicator-item"><span class="indicator-dot" style="background:#2962ff"></span><span class="indicator-name">MA(20)</span></div>
        <div class="indicator-item"><span class="indicator-dot" style="background:#7b61ff"></span><span class="indicator-name">MA(50)</span></div>
        <div class="indicator-item"><span class="indicator-dot" style="background:#ff9800"></span><span class="indicator-name">MA(200)</span></div>
        <div class="indicator-item"><span class="indicator-dot" style="background:#26a69a"></span><span class="indicator-name">Volume</span></div>
      </div>
    </aside>
  </div>
</main>

<script>
const params = new URLSearchParams(window.location.search);
let currentSymbol = (params.get('symbol') || '').trim().toUpperCase();
let fallbackName = params.get('name') || currentSymbol;
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const candleReadout = document.getElementById('candleReadout');
const maGroup = document.getElementById('maGroup');
const maToggle = document.getElementById('maToggle');
const pageLayout = document.getElementById('pageLayout');
const stockPanel = document.getElementById('stockPanel');
const stockListEl = document.getElementById('stockList');
const universeSelect = document.getElementById('universeSelect');
const sortSelect = document.getElementById('sortSelect');
const mobileSortSelect = document.getElementById('mobileSortSelect');
const metricSelect = document.getElementById('metricSelect');
const directionSelect = document.getElementById('directionSelect');
const stockSearch = document.getElementById('stockSearch');
const MOVING_AVERAGES = [
  { key:'ma10', label:'MA10', period:10, color:'#ffffff', alpha:0.2 },
  { key:'ma20', label:'MA20', period:20, color:'#2962ff', alpha:0.95 },
  { key:'ma50', label:'MA50', period:50, color:'#7b61ff', alpha:0.5 },
  { key:'ma200', label:'MA200', period:200, color:'#ff9800', alpha:0.5 }
];
const UNIVERSE_LABELS = { r2kRaw:'Russell 2000', spRaw:'S&P 500', ndqRaw:'Nasdaq 100', all:'All Stocks' };
const SORT_LABELS = { gain:'Gain', rank:'Rank', price:'Price', marketCapNum:'Market Cap', symbol:'Symbol' };
const DEFAULT_VISIBLE_CANDLES = 220;
const TOUCH_INSPECT_DELAY = 350;
const TOUCH_PAN_THRESHOLD = 7;
const state = {
  candles: [], start: 0, end: 0, hover: -1, dragging: false, dragX: 0, dragStart: 0, dragEnd: 0,
  pinching: false, pinchDistance: 0, pinchStart: 0, pinchEnd: 0, pinchRatio: 0.5,
  touchMode: 'idle', touchTimer: null, touchStartX: 0, touchStartY: 0,
  maCollapsed: false,
  marketIndex: null, stockRows: [], activeRange: 'all',
  universe: params.get('universe') || 'r2kRaw',
  metric: params.get('metric') || 'd',
  sortKey: normalizeSortKey(params.get('sort') || 'gain'),
  sortDir: params.get('dir') === 'asc' ? 'asc' : 'desc'
};
let pendingLayoutRedraw = false;

document.getElementById('symbol').textContent = currentSymbol || 'UNKNOWN';
document.getElementById('name').textContent = fallbackName || 'Stock chart';
document.title = currentSymbol ? currentSymbol + ' Candlestick Chart' : 'Stock Chart';

function normalizeSortKey(key){
  if(key === 'mcapNum') return 'marketCapNum';
  if(['gain','rank','price','marketCapNum','symbol'].includes(key)) return key;
  return 'gain';
}

function fmt(value, digits=2){
  if(value === null || value === undefined || Number.isNaN(Number(value))) return '--';
  return Number(value).toFixed(digits);
}

function fmtPct(value){
  if(value === null || value === undefined || Number.isNaN(Number(value))) return '--';
  const numeric = Number(value);
  return (numeric >= 0 ? '+' : '') + numeric.toFixed(2) + '%';
}

function setStatus(text){
  statusEl.style.display = text ? 'block' : 'none';
  statusEl.textContent = text || '';
}

function setRange(range){
  const total = state.candles.length;
  const count = range === 'all' ? Math.min(total, DEFAULT_VISIBLE_CANDLES) : Math.min(total, Number(range));
  state.activeRange = range;
  state.end = total;
  state.start = Math.max(0, total - count);
  state.hover = -1;
  document.querySelectorAll('#ranges .btn').forEach(item => item.classList.toggle('active', item.dataset.range === range));
  draw();
}

function renderHeader(data){
  const candles = data.prices;
  const last = candles[candles.length - 1];
  const prev = candles[candles.length - 2] || last;
  const diff = last.close - prev.close;
  const pct = prev.close ? diff / prev.close * 100 : 0;
  const changeEl = document.getElementById('change');
  document.getElementById('symbol').textContent = data.symbol;
  document.getElementById('name').textContent = data.name || fallbackName || data.symbol;
  document.getElementById('sector').textContent = data.sector || 'Sector';
  document.getElementById('mcap').textContent = data.marketCap || 'Market cap';
  document.getElementById('lastPrice').textContent = fmt(last.close);
  changeEl.textContent = (diff >= 0 ? '+' : '') + fmt(diff) + ' (' + (pct >= 0 ? '+' : '') + fmt(pct) + '%)';
  changeEl.className = 'change ' + (diff >= 0 ? 'up' : 'down');
  document.title = data.symbol + ' Candlestick Chart';
}

function resizeCanvas(){
  draw();
}

function syncCanvasSize(rect){
  const dpr = window.devicePixelRatio || 1;
  const nextWidth = Math.max(1, Math.floor(rect.width * dpr));
  const nextHeight = Math.max(1, Math.floor(rect.height * dpr));
  if(canvas.width !== nextWidth || canvas.height !== nextHeight){
    canvas.width = nextWidth;
    canvas.height = nextHeight;
  }
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function queueLayoutRedraw(width, height){
  if(pendingLayoutRedraw) return;
  pendingLayoutRedraw = true;
  requestAnimationFrame(() => {
    pendingLayoutRedraw = false;
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const bitmapWidth = Math.max(1, Math.floor(rect.width * dpr));
    const bitmapHeight = Math.max(1, Math.floor(rect.height * dpr));
    const cssChanged = Math.abs(rect.width - width) > 0.5 || Math.abs(rect.height - height) > 0.5;
    const bitmapChanged = canvas.width !== bitmapWidth || canvas.height !== bitmapHeight;
    if(cssChanged || bitmapChanged) draw();
  });
}

function visibleCandles(){
  return state.candles.slice(state.start, state.end);
}

function calculateMovingAverages(candles){
  MOVING_AVERAGES.forEach(ma => {
    let sum = 0;
    candles.forEach((candle, index) => {
      sum += candle.close;
      if(index >= ma.period) sum -= candles[index - ma.period].close;
      candle[ma.key] = index >= ma.period - 1 ? sum / ma.period : null;
    });
  });
}

function renderMaLegend(candle){
  const target = document.getElementById('maLegend');
  maGroup.classList.toggle('collapsed', state.maCollapsed);
  maToggle.textContent = state.maCollapsed ? '+' : '-';
  maToggle.setAttribute('aria-expanded', String(!state.maCollapsed));
  maToggle.setAttribute('aria-label', state.maCollapsed ? 'Expand moving averages' : 'Collapse moving averages');
  maToggle.title = state.maCollapsed ? 'Expand moving averages' : 'Collapse moving averages';
  if(state.maCollapsed){
    target.innerHTML = '';
    return;
  }
  target.innerHTML = MOVING_AVERAGES.map(ma => {
    const value = candle && candle[ma.key] ? fmt(candle[ma.key]) : '--';
    return '<span class="ma-item" style="color:'+ma.color+';opacity:'+ma.alpha+'"><span class="ma-dot" style="background:'+ma.color+'"></span>'+ma.label+' '+value+'</span>';
  }).join('');
}

function renderCandleReadout(candle, index){
  if(!candle){
    candleReadout.textContent = 'Select a candlestick';
    return;
  }
  const prev = state.candles[Math.max(0, index - 1)] || candle;
  const diff = candle.close - prev.close;
  const pct = prev.close ? diff / prev.close * 100 : 0;
  const direction = diff >= 0 ? 'up' : 'down';
  const sign = diff >= 0 ? '+' : '';
  candleReadout.innerHTML =
    '<strong>'+candle.time+'</strong>' +
    '<span>C <b class="close-price '+direction+'">'+fmt(candle.close)+'</b></span>' +
    '<span class="price-change '+direction+'">'+sign+fmt(diff)+' ('+sign+fmt(pct)+'%)</span>';
}

function drawMovingAverage(ma, candles, xFor, yFor){
  ctx.strokeStyle = ma.color;
  ctx.lineWidth = 1.4;
  ctx.globalAlpha = ma.alpha;
  ctx.beginPath();
  let started = false;
  candles.forEach((candle, index) => {
    const value = candle[ma.key];
    if(!value){
      started = false;
      return;
    }
    const x = xFor(index);
    const y = yFor(value);
    if(!started){
      ctx.moveTo(x, y);
      started = true;
    }else{
      ctx.lineTo(x, y);
    }
  });
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawGrid(left, top, right, priceBottom, volumeTop, bottom, width, height, minPrice, maxPrice, maxVolume, candles, xFor, yFor){
  ctx.strokeStyle = '#26323b';
  ctx.lineWidth = 1;
  ctx.setLineDash([1, 9]);
  ctx.fillStyle = '#787b86';
  ctx.font = '12px SF Mono, Fira Code, monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  for(let i=0;i<=5;i++){
    const y = top + (priceBottom - top) * i / 5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(width, y);
    ctx.stroke();
    const price = maxPrice - (maxPrice - minPrice) * i / 5;
    ctx.fillText(fmt(price), 8, y);
  }
  ctx.setLineDash([]);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  const ticks = Math.min(6, candles.length);
  for(let i=0;i<ticks;i++){
    const idx = Math.floor(i * (candles.length - 1) / Math.max(1, ticks - 1));
    const x = xFor(idx);
    ctx.fillText(candles[idx].time.slice(5), x, height - bottom + 8);
  }
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(maxVolume ? Math.round(maxVolume / 1000000) + 'M' : '', 8, volumeTop + 8);
}

function updateHistoryMeta(){
  if(!state.candles.length) return;
  const first = state.candles[0].time;
  const last = state.candles[state.candles.length - 1].time;
  const visible = visibleCandles();
  const shown = visible.length ? visible[0].time + ' to ' + visible[visible.length - 1].time : '--';
  const hint = document.querySelector('.hint');
  if(hint){
    hint.textContent = 'History ' + first + ' to ' + last + ' · Showing ' + shown + ' · Drag to pan · Wheel or pinch to zoom';
  }
}

function chartPadding(width){
  if(width <= 380) return { left: 4, right: 4, top: 18, bottom: 28 };
  if(width <= 520) return { left: 5, right: 5, top: 18, bottom: 30 };
  return { left: 6, right: 6, top: 22, bottom: 36 };
}

function plotWidthFor(width){
  const pad = chartPadding(width);
  return Math.max(1, width - pad.left - pad.right);
}

function draw(){
  const readoutIndex = state.hover >= state.start && state.hover < state.end ? state.hover : state.end - 1;
  renderMaLegend(state.candles[readoutIndex]);
  renderCandleReadout(state.candles[readoutIndex], readoutIndex);

  const rect = canvas.getBoundingClientRect();
  const width = rect.width;
  const height = rect.height;
  syncCanvasSize(rect);
  const candles = visibleCandles();
  if(!candles.length) return;
  updateHistoryMeta();

  const padBox = chartPadding(width);
  const left = padBox.left, right = padBox.right, top = padBox.top, bottom = padBox.bottom;
  const volumeHeight = Math.max(64, Math.min(92, height * 0.18));
  const gap = 16;
  const priceBottom = height - bottom - volumeHeight - gap;
  const volumeTop = priceBottom + gap;
  const plotWidth = width - left - right;
  const step = plotWidth / candles.length;
  const bodyWidth = Math.max(2, Math.min(12, step * 0.62));
  const maValues = [];
  candles.forEach(c => MOVING_AVERAGES.forEach(ma => { if(c[ma.key]) maValues.push(c[ma.key]); }));
  const highs = candles.map(c => c.high).concat(maValues);
  const lows = candles.map(c => c.low).concat(maValues);
  let maxPrice = Math.max(...highs);
  let minPrice = Math.min(...lows);
  const pad = (maxPrice - minPrice || maxPrice || 1) * 0.06;
  maxPrice += pad;
  minPrice -= pad;
  const maxVolume = Math.max(...candles.map(c => c.volume || 0), 0);
  const xFor = i => left + i * step + step / 2;
  const yFor = price => top + (maxPrice - price) / (maxPrice - minPrice) * (priceBottom - top);

  drawGrid(left, top, right, priceBottom, volumeTop, bottom, width, height, minPrice, maxPrice, maxVolume, candles, xFor, yFor);

  candles.forEach((c, i) => {
    const x = xFor(i);
    const up = c.close >= c.open;
    const color = up ? '#26a69a' : '#ef5350';
    const yOpen = yFor(c.open), yClose = yFor(c.close), yHigh = yFor(c.high), yLow = yFor(c.low);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, yHigh);
    ctx.lineTo(x, yLow);
    ctx.stroke();
    const bodyTop = Math.min(yOpen, yClose);
    const bodyHeight = Math.max(1, Math.abs(yOpen - yClose));
    if(up){
      ctx.strokeRect(x - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight);
    }else{
      ctx.fillRect(x - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight);
    }
    if(maxVolume && c.volume){
      const vh = (c.volume / maxVolume) * (height - bottom - volumeTop);
      ctx.globalAlpha = 0.35;
      ctx.fillRect(x - bodyWidth / 2, height - bottom - vh, bodyWidth, vh);
      ctx.globalAlpha = 1;
    }
  });

  MOVING_AVERAGES.forEach(ma => drawMovingAverage(ma, candles, xFor, yFor));

  if(state.hover >= state.start && state.hover < state.end){
    const local = state.hover - state.start;
    const c = state.candles[state.hover];
    const x = xFor(local);
    const y = yFor(c.close);
    ctx.strokeStyle = '#2962ff';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(x, top);
    ctx.lineTo(x, priceBottom);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  queueLayoutRedraw(width, height);
}

function nearestIndex(clientX){
  const rect = canvas.getBoundingClientRect();
  const padBox = chartPadding(rect.width);
  const left = padBox.left;
  const candles = visibleCandles();
  const step = plotWidthFor(rect.width) / Math.max(1, candles.length);
  const local = Math.max(0, Math.min(candles.length - 1, Math.floor((clientX - rect.left - left) / step)));
  return state.start + local;
}

function beginDrag(clientX){
  state.dragging = true;
  state.pinching = false;
  state.dragX = clientX;
  state.dragStart = state.start;
  state.dragEnd = state.end;
}

function updateDrag(clientX){
  if(!state.dragging) return;
  const rect = canvas.getBoundingClientRect();
  const count = state.dragEnd - state.dragStart;
  const step = plotWidthFor(rect.width) / Math.max(1, count);
  const shift = Math.round((state.dragX - clientX) / step);
  let start = state.dragStart + shift;
  start = Math.max(0, Math.min(state.candles.length - count, start));
  state.start = start;
  state.end = start + count;
}

function inspectTouch(clientX){
  state.dragging = false;
  state.pinching = false;
  state.hover = nearestIndex(clientX);
}

function clearTouchTimer(){
  if(state.touchTimer){
    clearTimeout(state.touchTimer);
    state.touchTimer = null;
  }
}

function beginTouchInspect(touch){
  clearTouchTimer();
  state.touchMode = 'pending';
  state.touchStartX = touch.clientX;
  state.touchStartY = touch.clientY;
  state.dragging = false;
  state.pinching = false;
  state.touchTimer = setTimeout(() => {
    state.touchTimer = null;
    if(state.touchMode !== 'pending') return;
    state.touchMode = 'inspect';
    inspectTouch(state.touchStartX);
    draw();
  }, TOUCH_INSPECT_DELAY);
}

function updateTouchInspect(touch){
  if(state.touchMode === 'inspect'){
    inspectTouch(touch.clientX);
    return;
  }
  if(state.touchMode === 'pan'){
    updateDrag(touch.clientX);
    state.hover = -1;
    return;
  }
  if(state.touchMode !== 'pending') return;

  const dx = touch.clientX - state.touchStartX;
  const dy = touch.clientY - state.touchStartY;
  if(Math.hypot(dx, dy) < TOUCH_PAN_THRESHOLD) return;

  clearTouchTimer();
  state.touchMode = 'pan';
  state.hover = -1;
  beginDrag(state.touchStartX);
  updateDrag(touch.clientX);
}

function endGesture(){
  clearTouchTimer();
  state.touchMode = 'idle';
  state.dragging = false;
  state.pinching = false;
}

function touchDistance(touches){
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.max(1, Math.hypot(dx, dy));
}

function touchMidX(touches){
  return (touches[0].clientX + touches[1].clientX) / 2;
}

function beginPinch(touches){
  clearTouchTimer();
  const rect = canvas.getBoundingClientRect();
  const padBox = chartPadding(rect.width);
  state.touchMode = 'pinch';
  state.pinching = true;
  state.dragging = false;
  state.pinchDistance = touchDistance(touches);
  state.pinchStart = state.start;
  state.pinchEnd = state.end;
  state.pinchRatio = Math.max(0, Math.min(1, (touchMidX(touches) - rect.left - padBox.left) / plotWidthFor(rect.width)));
}

function updatePinch(touches){
  if(!state.pinching || !state.candles.length) return;
  const total = state.candles.length;
  const startCount = state.pinchEnd - state.pinchStart;
  const scale = state.pinchDistance / touchDistance(touches);
  const next = Math.max(20, Math.min(total, Math.round(startCount * scale)));
  const center = state.pinchStart + startCount * state.pinchRatio;
  let start = Math.round(center - next * state.pinchRatio);
  start = Math.max(0, Math.min(total - next, start));
  state.start = start;
  state.end = start + next;
  state.hover = -1;
}

canvas.addEventListener('mousemove', event => {
  if(state.dragging){
    updateDrag(event.clientX);
  }else{
    state.hover = nearestIndex(event.clientX);
  }
  draw();
});

canvas.addEventListener('mouseleave', () => {
  state.hover = -1;
  endGesture();
  draw();
});

canvas.addEventListener('mousedown', event => {
  beginDrag(event.clientX);
});

window.addEventListener('mouseup', endGesture);

canvas.addEventListener('touchstart', event => {
  if(event.touches.length === 1){
    beginTouchInspect(event.touches[0]);
  }else if(event.touches.length >= 2){
    beginPinch(event.touches);
  }
  draw();
  event.preventDefault();
}, { passive:false });

canvas.addEventListener('touchmove', event => {
  if(event.touches.length >= 2){
    updatePinch(event.touches);
  }else if(event.touches.length === 1){
    updateTouchInspect(event.touches[0]);
  }
  draw();
  event.preventDefault();
}, { passive:false });

canvas.addEventListener('touchend', event => {
  if(event.touches.length >= 2){
    beginPinch(event.touches);
  }else if(event.touches.length === 1){
    beginTouchInspect(event.touches[0]);
  }else{
    endGesture();
  }
  draw();
  event.preventDefault();
}, { passive:false });

canvas.addEventListener('wheel', event => {
  event.preventDefault();
  const total = state.candles.length;
  const current = state.end - state.start;
  const rect = canvas.getBoundingClientRect();
  const padBox = chartPadding(rect.width);
  const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left - padBox.left) / plotWidthFor(rect.width)));
  const center = state.start + current * ratio;
  const next = Math.max(20, Math.min(total, Math.round(current * (event.deltaY > 0 ? 1.18 : 0.84))));
  let start = Math.round(center - next * ratio);
  start = Math.max(0, Math.min(total - next, start));
  state.start = start;
  state.end = start + next;
  draw();
}, { passive:false });

document.getElementById('ranges').addEventListener('click', event => {
  const button = event.target.closest('button[data-range]');
  if(!button) return;
  setRange(button.dataset.range);
});

maToggle.addEventListener('click', () => {
  state.maCollapsed = !state.maCollapsed;
  draw();
});

function setupNavSearch(){
  const form = document.querySelector('.nav-search');
  if(!form) return;
  const input = form.querySelector('input[name="q"]');
  const runSearch = async () => {
    const query = (input.value || '').trim();
    if(!query) return;
    const root = form.dataset.root || '';
    let target = { symbol: query.toUpperCase(), name: query };
    try{
      const response = await fetch(root + 'market_data/index.json', { cache:'no-store' });
      if(response.ok){
        const index = await response.json();
        const groups = index.groups || {};
        const rows = Object.keys(groups).length
          ? Object.values(groups).flatMap(group => group.stocks || [])
          : (index.stocks || []);
        const normalized = query.toLowerCase();
        const match = rows.find(row => String(row.symbol || '').toLowerCase() === normalized)
          || rows.find(row => String(row.name || '').toLowerCase().includes(normalized));
        if(match) target = { symbol: match.symbol, name: match.name || match.symbol };
      }
    }catch(error){}
    const params = new URLSearchParams();
    params.set('symbol', target.symbol);
    params.set('name', target.name);
    window.location.href = root + 'stock_chart.html?' + params.toString();
  };
  form.addEventListener('submit', event => {
    event.preventDefault();
    runSearch();
  });
  input.addEventListener('keydown', event => {
    if(event.key !== 'Enter') return;
    event.preventDefault();
    runSearch();
  });
}

function rowSymbol(row){ return (row.symbol || row.t || '').toUpperCase(); }
function rowName(row){ return row.name || row.n || rowSymbol(row); }
function rowSector(row){ return row.sector || row.s || 'Sector'; }
function rowMarketCap(row){ return row.marketCap || row.c || 'Market cap'; }
function rowPrice(row){ return Number(row.price ?? row.p ?? 0); }
function rowMarketCapNum(row){ return Number(row.marketCapNum ?? row.mn ?? 0); }
function rowRank(row){ return Number(row.rank ?? row.r ?? 9999); }
function rowMetric(row){ return Number(row[state.metric] ?? 0); }

function groupEntries(){
  const groups = state.marketIndex && state.marketIndex.groups ? state.marketIndex.groups : {};
  const entries = Object.keys(groups).map(key => ({ key, label: groups[key].label || UNIVERSE_LABELS[key] || key }));
  if(entries.length) entries.push({ key:'all', label:'All Stocks' });
  return entries.length ? entries : [{ key:'all', label:'All Stocks' }];
}

function getBaseRows(){
  const index = state.marketIndex || {};
  const groups = index.groups || {};
  if(state.universe !== 'all' && groups[state.universe] && groups[state.universe].stocks){
    return groups[state.universe].stocks;
  }
  const source = Object.keys(groups).length
    ? Object.values(groups).flatMap(group => group.stocks || [])
    : (index.stocks || []);
  const seen = new Set();
  return source.filter(row => {
    const symbol = rowSymbol(row);
    if(!symbol || seen.has(symbol)) return false;
    seen.add(symbol);
    return true;
  });
}

function getSortValue(row){
  if(state.sortKey === 'gain') return rowMetric(row);
  if(state.sortKey === 'rank') return rowRank(row);
  if(state.sortKey === 'price') return rowPrice(row);
  if(state.sortKey === 'marketCapNum') return rowMarketCapNum(row);
  return rowSymbol(row);
}

function sortedRows(){
  const query = stockSearch.value.trim().toLowerCase();
  let rows = getBaseRows();
  if(query){
    rows = rows.filter(row => rowSymbol(row).toLowerCase().includes(query) || rowName(row).toLowerCase().includes(query));
  }
  rows = rows.slice().sort((a,b) => {
    const av = getSortValue(a);
    const bv = getSortValue(b);
    if(typeof av === 'string' || typeof bv === 'string'){
      return state.sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    }
    return state.sortDir === 'asc' ? av - bv : bv - av;
  });
  return rows;
}

function valueLabel(row){
  if(state.sortKey === 'gain') return fmtPct(rowMetric(row));
  if(state.sortKey === 'rank') return '#' + rowRank(row);
  if(state.sortKey === 'price') return fmt(rowPrice(row));
  if(state.sortKey === 'marketCapNum') return rowMarketCap(row);
  return rowSymbol(row);
}

function syncControls(){
  const entries = groupEntries();
  if(!entries.some(entry => entry.key === state.universe)) state.universe = entries[0].key;
  universeSelect.innerHTML = entries.map(entry => '<option value="'+entry.key+'">'+entry.label+'</option>').join('');
  universeSelect.value = state.universe;
  sortSelect.value = state.sortKey;
  mobileSortSelect.value = state.sortKey;
  metricSelect.value = state.metric;
  directionSelect.value = state.sortDir;
}

function renderStockList(){
  syncControls();
  state.stockRows = sortedRows();
  const currentIndex = state.stockRows.findIndex(row => rowSymbol(row) === currentSymbol);
  stockListEl.innerHTML = state.stockRows.map((row, index) => {
    const symbol = rowSymbol(row);
    const active = symbol === currentSymbol ? ' active' : '';
    const value = valueLabel(row);
    const numeric = state.sortKey === 'gain' ? rowMetric(row) : null;
    const valueClass = numeric === null ? '' : (numeric >= 0 ? ' up' : ' down');
    return '<button class="stock-row'+active+'" data-symbol="'+symbol+'" type="button">' +
      '<span class="stock-rank">'+(index + 1)+'</span>' +
      '<span class="stock-main"><span class="stock-symbol">'+symbol+'</span><span class="stock-name">'+rowName(row)+'</span></span>' +
      '<span class="stock-value'+valueClass+'">'+value+'</span>' +
      '</button>';
  }).join('');
  if(currentIndex >= 0){
    const active = stockListEl.querySelector('.stock-row.active');
    if(active) active.scrollIntoView({ block:'nearest' });
  }
}

function currentRow(){
  return state.stockRows.find(row => rowSymbol(row) === currentSymbol);
}

function updateUrl(row){
  const next = new URLSearchParams();
  next.set('symbol', currentSymbol);
  next.set('name', rowName(row || currentRow() || { symbol: currentSymbol, name: fallbackName }));
  next.set('universe', state.universe);
  next.set('metric', state.metric);
  next.set('sort', state.sortKey);
  next.set('dir', state.sortDir);
  window.history.replaceState(null, '', window.location.pathname + '?' + next.toString());
}

async function switchStock(symbol){
  const row = state.stockRows.find(item => rowSymbol(item) === symbol);
  currentSymbol = symbol;
  fallbackName = row ? rowName(row) : symbol;
  renderStockList();
  updateUrl(row);
  await loadChart();
  stockPanel.classList.remove('open');
}

function moveStock(offset){
  if(!state.stockRows.length) return;
  let index = state.stockRows.findIndex(row => rowSymbol(row) === currentSymbol);
  if(index < 0) index = 0;
  const next = Math.max(0, Math.min(state.stockRows.length - 1, index + offset));
  switchStock(rowSymbol(state.stockRows[next]));
}

function setupStockControls(){
  document.getElementById('panelToggle').addEventListener('click', () => {
    if(window.matchMedia('(max-width: 768px)').matches){
      stockPanel.classList.toggle('open');
    }else{
      pageLayout.classList.toggle('sidebar-collapsed');
      document.getElementById('panelToggle').textContent = pageLayout.classList.contains('sidebar-collapsed') ? '›' : '‹';
      setTimeout(resizeCanvas, 80);
    }
  });
  document.getElementById('mobileListToggle').addEventListener('click', () => stockPanel.classList.toggle('open'));
  stockListEl.addEventListener('click', event => {
    const button = event.target.closest('.stock-row[data-symbol]');
    if(button) switchStock(button.dataset.symbol);
  });
  universeSelect.addEventListener('change', () => { state.universe = universeSelect.value; renderStockList(); updateUrl(currentRow()); });
  sortSelect.addEventListener('change', () => { state.sortKey = normalizeSortKey(sortSelect.value); renderStockList(); updateUrl(currentRow()); });
  mobileSortSelect.addEventListener('change', () => { state.sortKey = normalizeSortKey(mobileSortSelect.value); renderStockList(); updateUrl(currentRow()); });
  metricSelect.addEventListener('change', () => { state.metric = metricSelect.value; renderStockList(); updateUrl(currentRow()); });
  directionSelect.addEventListener('change', () => { state.sortDir = directionSelect.value === 'asc' ? 'asc' : 'desc'; renderStockList(); updateUrl(currentRow()); });
  stockSearch.addEventListener('input', renderStockList);
  document.getElementById('prevStock').addEventListener('click', () => moveStock(-1));
  document.getElementById('nextStock').addEventListener('click', () => moveStock(1));
  document.getElementById('mobilePrevStock').addEventListener('click', () => moveStock(-1));
  document.getElementById('mobileNextStock').addEventListener('click', () => moveStock(1));
}

async function loadMarketIndex(){
  try{
    const response = await fetch('market_data/index.json', { cache:'no-store' });
    if(!response.ok) throw new Error('No market index');
    state.marketIndex = await response.json();
  }catch(error){
    state.marketIndex = { stocks: currentSymbol ? [{ symbol: currentSymbol, name: fallbackName }] : [] };
  }
  setupStockControls();
  renderStockList();
}

async function loadChart(){
  if(!currentSymbol){
    setStatus('Missing stock symbol.');
    return;
  }
  try{
    setStatus('Loading price data...');
    const response = await fetch('market_data/' + encodeURIComponent(currentSymbol) + '.json', { cache:'no-store' });
    if(!response.ok) throw new Error('No chart data found for ' + currentSymbol);
    const data = await response.json();
    if(!data.prices || !data.prices.length) throw new Error('Chart data is empty for ' + currentSymbol);
    currentSymbol = data.symbol;
    fallbackName = data.name || fallbackName || currentSymbol;
    state.candles = data.prices;
    calculateMovingAverages(state.candles);
    renderHeader(data);
    setStatus('');
    setRange(state.activeRange || 'all');
  }catch(error){
    setStatus(error.message || 'Unable to load chart data.');
  }
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
setupNavSearch();
loadMarketIndex();
loadChart();
</script>
</body>
</html>
